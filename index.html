<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mindstekrav — Matematiktræner</title>
<script src="https://cdn.jsdelivr.net/npm/plotly.js-dist@2.27.0/plotly.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;padding:1.5rem;background:#f5f5f0;min-height:100vh;max-width:700px;margin:0 auto}
.screen{display:none}.screen.active{display:block}
.card{background:#fff;border:1px solid #e0e0d8;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.forloeb-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:10px;margin-top:1rem}
.f-btn{background:#fff;border:1px solid #ccc;border-radius:8px;padding:0.75rem 1rem;cursor:pointer;font-size:13px;font-weight:500;color:#222;text-align:left;transition:background 0.15s;line-height:1.5}
.f-btn:hover{background:#f0f0ec}
.f-btn.active{border:2px solid #185FA5;background:#E6F1FB;color:#0C447C}
.q-label{font-size:11px;color:#888;margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px}
.q-text{font-size:15px;color:#111;line-height:1.75;margin-bottom:1.25rem}
.mc-option{display:block;width:100%;text-align:left;background:#fff;border:1px solid #ddd;border-radius:8px;padding:0.65rem 1rem;margin-bottom:8px;cursor:pointer;font-size:14px;color:#222;transition:all 0.1s}
.mc-option:hover{background:#f5f5f0;border-color:#aaa}
.mc-option.correct{background:#EAF3DE;border:2px solid #3B6D11;color:#27500A;pointer-events:none}
.mc-option.wrong{background:#FCEBEB;border:2px solid #A32D2D;color:#791F1F;pointer-events:none}
.mc-option.show-correct{background:#EAF3DE;border:2px solid #3B6D11;color:#27500A;pointer-events:none}
.mc-option.disabled{pointer-events:none;opacity:0.5}
.input-row{display:flex;gap:8px;align-items:center;margin-bottom:1rem}
.input-row input{flex:1;padding:0.55rem 0.75rem;border:1px solid #ccc;border-radius:8px;font-size:15px;background:#fff;color:#111}
.input-row input:disabled{background:#f5f5f0;color:#888}
.feedback{border-radius:8px;padding:0.75rem 1rem;font-size:14px;margin-bottom:1rem;display:none;line-height:1.6}
.feedback.correct{background:#EAF3DE;color:#27500A;display:block}
.feedback.wrong{background:#FCEBEB;color:#791F1F;display:block}
.score-row{display:flex;gap:12px;margin-bottom:1rem}
.score-box{background:#f5f5f0;border-radius:8px;padding:0.75rem 1rem;flex:1;text-align:center}
.score-box .num{font-size:26px;font-weight:500;color:#111}
.score-box .lbl{font-size:12px;color:#666;margin-top:2px}
button.primary{background:#fff;border:1px solid #ccc;border-radius:8px;padding:0.6rem 1.2rem;font-size:14px;cursor:pointer;color:#222;transition:background 0.15s}
button.primary:hover{background:#f0f0ec}
.progress-bar{height:4px;background:#e8e8e2;border-radius:2px;margin-bottom:1.25rem}
.progress-fill{height:4px;background:#185FA5;border-radius:2px;transition:width 0.3s}
.plot-wrap{margin:0.75rem 0;border:1px solid #e0e0d8;border-radius:8px;overflow:hidden;background:#fff}
h1{font-size:18px;font-weight:600;color:#111;margin-bottom:4px}
.sub{font-size:14px;color:#666;margin-bottom:1rem}
</style>
</head>
<body>

<div id="screen-select" class="screen active">
  <div class="card">
    <h1>Mindstekrav — matematiktræner</h1>
    <p class="sub">Vælg et forløb. Opgaverne genereres med tilfældige tal og interaktive grafer.</p>
    <div class="forloeb-grid" id="forloeb-grid"></div>
  </div>
  <div class="card">
    <p style="font-size:13px;color:#666;margin-bottom:8px">Antal opgaver per session</p>
    <div style="display:flex;gap:8px;flex-wrap:wrap" id="count-btns">
      <button class="f-btn active" onclick="setCount(5,this)">5</button>
      <button class="f-btn" onclick="setCount(10,this)">10</button>
      <button class="f-btn" onclick="setCount(15,this)">15</button>
      <button class="f-btn" onclick="setCount(999,this)">Alle</button>
    </div>
  </div>
  <button class="primary" onclick="startQuiz()" style="width:100%;padding:0.8rem;font-size:15px">Start træning</button>
  <button class="primary" onclick="startAllForloeb()" style="width:100%;padding:0.8rem;font-size:15px;margin-top:8px;border-color:#185FA5;color:#185FA5">Gennemgå alle forløb (overblik)</button>
</div>

<div id="screen-quiz" class="screen">
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <span class="q-label" id="q-forloeb"></span>
      <span style="font-size:12px;color:#888" id="q-counter"></span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <p class="q-label" id="q-type-label"></p>
    <div id="q-graph"></div>
    <p class="q-text" id="q-text"></p>
    <div id="mc-options"></div>
    <div id="input-area" style="display:none">
      <div class="input-row">
        <input type="text" id="answer-input" placeholder="Skriv dit svar..." onkeydown="if(event.key==='Enter')checkInput()">
        <button class="primary" onclick="checkInput()">Tjek</button>
      </div>
    </div>
    <div class="feedback" id="feedback"></div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="primary" id="next-btn" onclick="nextQuestion()" style="display:none;flex:1">Næste opgave</button>
      <button class="primary" onclick="goHome()" style="font-size:13px;color:#999">Afslut</button>
    </div>
  </div>
</div>

<div id="screen-result" class="screen">
  <div class="card">
    <h1 style="margin-bottom:1rem">Resultat</h1>
    <div class="score-row">
      <div class="score-box"><div class="num" id="res-correct">0</div><div class="lbl">Rigtige</div></div>
      <div class="score-box"><div class="num" id="res-wrong">0</div><div class="lbl">Forkerte</div></div>
      <div class="score-box"><div class="num" id="res-pct">0%</div><div class="lbl">Score</div></div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="primary" onclick="startQuiz()" style="flex:1">Prøv igen</button>
      <button class="primary" onclick="goHome()" style="flex:1">Vælg forløb</button>
    </div>
  </div>
</div>

<script>
const FORLOEB={F1:"Lineære funktioner",F2:"Eksponentielle funktioner",F3:"Andengradsfunktioner",F4:"Differentialregning",F5:"Finansiel regning",F6:"Beskrivende statistik",F7:"Sandsynlighedsregning",F8:"Hypotesetest og konfidensintervaller"};

function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function rndF(a,b,d){return parseFloat((Math.random()*(b-a)+a).toFixed(d));}
function shuffle(a){let r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}
function fmt(n){return String(n).replace('.',',');}
function fak(n){return n<=1?1:n*fak(n-1);}
function linspace(a,b,n){return Array.from({length:n},(_,i)=>a+(b-a)*i/(n-1));}

const PLOTLY_CONFIG={responsive:true,displayModeBar:false};
const PLOTLY_LAYOUT_BASE={
  margin:{l:50,r:20,t:20,b:50},
  plot_bgcolor:'#fafaf8',
  paper_bgcolor:'#fff',
  font:{family:'system-ui',size:12,color:'#555'},
  xaxis:{gridcolor:'#e8e8e2',zerolinecolor:'#aaa',zerolinewidth:1.5},
  yaxis:{gridcolor:'#e8e8e2',zerolinecolor:'#aaa',zerolinewidth:1.5},
  showlegend:false,
  height:280
};

function makePlotSpec(traces, layout){
  return {traces, layout};
}

function plotLines(traces, xrange, yrange){
  const layout=Object.assign({},PLOTLY_LAYOUT_BASE,{
    xaxis:Object.assign({},PLOTLY_LAYOUT_BASE.xaxis,{range:xrange}),
    yaxis:Object.assign({},PLOTLY_LAYOUT_BASE.yaxis,{range:yrange})
  });
  return makePlotSpec(traces, layout);
}

function renderGraph(spec){
  const wrap=document.createElement('div');
  wrap.className='plot-wrap';
  const id='plot_'+Date.now()+'_'+Math.floor(Math.random()*10000);
  const div=document.createElement('div');
  div.id=id;
  wrap.appendChild(div);
  setTimeout(()=>{
    if(document.getElementById(id)){
      Plotly.newPlot(id, spec.traces, spec.layout, PLOTLY_CONFIG);
    }
  }, 200);
  return wrap;
}

function makeFuncTrace(fn,xMin,xMax,color,name,dash){
  const xs=linspace(xMin,xMax,400);
  return{x:xs,y:xs.map(fn),mode:'lines',line:{color:color||'#185FA5',width:2.5,dash:dash||'solid'},name:name||''};
}

function makeBarTrace(xs,ys,color){
  return{x:xs,y:ys,type:'bar',marker:{color:color||'#B5D4F4',line:{color:'#185FA5',width:1}},width:0.5};
}

function makeScatterTrace(xs,ys,color,size){
  return{x:xs,y:ys,mode:'markers',marker:{color:color||'#C0392B',size:size||8}};
}

// ---- QUESTION GENERATORS ----
const GENERATORS={
  F1:[
    ()=>{const a=rnd(-5,5)||1,b=rnd(-10,10);return{type:"input",text:`En lineær funktion: f(x) = ${a}x ${b>=0?'+ '+b:'− '+Math.abs(b)}. Hvad er hældningskoefficienten?`,answer:String(a),accept:[String(a)],explanation:`Hældningskoefficienten er a = ${a}.`};},
    ()=>{const a=rnd(-5,5)||1,b=rnd(-10,10);return{type:"input",text:`Hvad er skæringen med y-aksen for f(x) = ${a}x ${b>=0?'+ '+b:'− '+Math.abs(b)}?`,answer:String(b),accept:[String(b)],explanation:`Skæringen med y-aksen er b = ${b} (sæt x=0).`};},
    ()=>{
      const a=rnd(-4,4)||1,b=rnd(-8,8);
      const x1=rnd(-2,2),y1=a*x1+b,x2=x1+rnd(2,5),y2=a*x2+b;
      const xMin=x1-2,xMax=x2+2,yMin=Math.min(y1,y2)-3,yMax=Math.max(y1,y2)+3;
      const t1=makeFuncTrace(x=>a*x+b,xMin,xMax,'#185FA5');
      const t2=makeScatterTrace([x1,x2],[y1,y2],'#C0392B',9);
      const graph=plotLines([t1,t2],[xMin,xMax],[yMin,yMax]);
      return{type:"input",text:`Grafen viser en lineær funktion der går gennem (${x1}, ${y1}) og (${x2}, ${y2}). Hvad er hældningskoefficienten?`,graph,answer:String(a),accept:[String(a)],explanation:`a = (${y2}−${y1})/(${x2}−${x1}) = ${y2-y1}/${x2-x1} = ${a}`};
    },
    ()=>{const a=rnd(-5,5)||1,b=rnd(-10,10),x=rnd(-5,5),fx=a*x+b;return{type:"input",text:`Bestem f(${x}) når f(x) = ${a}x ${b>=0?'+ '+b:'− '+Math.abs(b)}.`,answer:String(fx),accept:[String(fx)],explanation:`f(${x}) = ${a}·${x} ${b>=0?'+ '+b:'− '+Math.abs(b)} = ${fx}`};},
    ()=>{const s=rnd(20,60),p=rnd(8,20),k=rnd(3,15),t=s+p*k;return{type:"input",text:`En taxa koster ${s} kr i startgebyr og ${p} kr/km. Hvad koster ${k} km?`,answer:String(t),accept:[String(t),t+" kr"],explanation:`${s} + ${p}·${k} = ${t} kr`};},
    ()=>{const a=rnd(1,5),b=rnd(-10,10);return{type:"mc",text:`Hvad er den omvendte funktion til f(x) = ${a}x ${b>=0?'+ '+b:'− '+Math.abs(b)}?`,options:[`f⁻¹(x) = (x${b>=0?' − '+b:' + '+Math.abs(b)}) / ${a}`,`f⁻¹(x) = ${a}x ${b>=0?'− '+b:'+ '+Math.abs(b)}`,`f⁻¹(x) = x / ${a}`,`f⁻¹(x) = (x${b>=0?' + '+b:' − '+Math.abs(b)}) / ${a}`],correct:0,explanation:`Byt om: x = ${a}y ${b>=0?'+ '+b:'− '+Math.abs(b)} → y = (x${b>=0?' − '+b:' + '+Math.abs(b)}) / ${a}`};},
    ()=>{const a=rnd(-4,4)||1,b=rnd(-5,5);return{type:"mc",text:`Er f(x) = ${a}x ${b>=0?'+ '+b:'− '+Math.abs(b)} voksende eller aftagende?`,options:["Voksende","Aftagende"],correct:a>0?0:1,explanation:`a = ${a} er ${a>0?"positiv → voksende":"negativ → aftagende"}.`};},
  ],
  F2:[
    ()=>{const b=rnd(2,50),a=rndF(0.85,1.5,2);return{type:"input",text:`f(x) = ${b} · ${fmt(a)}ˣ. Hvad er begyndelsesværdien?`,answer:String(b),accept:[String(b)],explanation:`f(0) = ${b} · 1 = ${b}`};},
    ()=>{const r=rnd(2,20),b=rnd(2,30),a=parseFloat((1+r/100).toFixed(2));return{type:"input",text:`Hvad er vækstraten i % for f(x) = ${b} · ${fmt(a)}ˣ?`,answer:String(r),accept:[String(r),r+"%"],explanation:`a = ${fmt(a)} = 1 + r/100 → r = ${r}%`};},
    ()=>{
      const rising=Math.random()>0.5,a=rising?rndF(1.2,1.8,2):rndF(0.4,0.85,2),b=rnd(1,5);
      const T=rising?Math.round(Math.log(2)/Math.log(a)*10)/10:Math.round(Math.log(0.5)/Math.log(a)*10)/10;
      const xMax=Math.ceil(T*3.5);
      const word=rising?"fordoblingskonstanten T₂":"halveringskonstanten T½";
      const fn=x=>b*Math.pow(a,x);
      const yMax=fn(xMax)*1.1,yMin=0;
      const t1=makeFuncTrace(fn,0,xMax,'#185FA5');
      const tMark=makeScatterTrace([T],[fn(T)],'#C0392B',10);
      const graph=plotLines([t1,tMark],[0,xMax],[yMin,yMax]);
      return{type:"input",text:`Aflæs ${word} fra grafen. (1 decimal — brug zoom ved behov)`,graph,answer:fmt(T),accept:[fmt(T),String(T)],explanation:`${word} er x-værdien hvor f er ${rising?"fordoblet":"halveret"}. T = ${fmt(T)}.`};
    },
    ()=>{
      const rising=Math.random()>0.5,a=rising?rndF(1.3,1.8,2):rndF(0.4,0.75,2),b=rnd(2,6);
      const a2=rising?rndF(0.4,0.75,2):rndF(1.3,1.8,2),b2=rnd(2,6);
      const which=rnd(0,1);
      const [ua,ub]=[which===0?a:a2,which===0?b:b2];
      const xMax=6;
      const fn=x=>ub*Math.pow(ua,x);
      const yMax=Math.max(fn(0),fn(xMax))*1.2,yMin=0;
      const t1=makeFuncTrace(fn,-2,xMax,'#185FA5');
      const graph=plotLines([t1],[-2,xMax],[yMin,yMax]);
      const opts=[`f(x) = ${b} · ${fmt(a)}ˣ`,`g(x) = ${b2} · ${fmt(a2)}ˣ`];
      return{type:"mc",text:`Hvilken forskrift passer til grafen?`,graph,options:opts,correct:which,explanation:`Begyndelsesværdien er ${ub} og a = ${fmt(ua)} → ${ua>1?"voksende":"aftagende"}.`};
    },
    ()=>{const base=rnd(2,4),exp=rnd(2,4),bv=rnd(1,3),rhs=bv*Math.pow(base,exp);return{type:"input",text:`Løs ligningen ${bv} · ${base}ˣ = ${rhs}.`,answer:String(exp),accept:[String(exp),"x="+exp],explanation:`${base}ˣ = ${rhs/bv} = ${base}^${exp} → x = ${exp}`};},
    ()=>{const rising=Math.random()>0.5,a=rising?rndF(1.1,1.8,2):rndF(0.5,0.9,2),b=rnd(2,30);return{type:"mc",text:`Er f(x) = ${b} · ${fmt(a)}ˣ voksende eller aftagende?`,options:["Voksende","Aftagende"],correct:rising?0:1,explanation:`a = ${fmt(a)} ${a>1?"er > 1 → voksende":"er < 1 → aftagende"}.`};},
  ],
  F3:[
    ()=>{const a=rnd(1,3),b=rnd(-6,6),c=rnd(-5,5),d=b*b-4*a*c;return{type:"input",text:`Beregn diskriminanten for f(x) = ${a}x² ${b>=0?'+ '+b:'− '+Math.abs(b)}x ${c>=0?'+ '+c:'− '+Math.abs(c)}.`,answer:String(d),accept:[String(d)],explanation:`d = b²−4ac = ${b*b}−${4*a*c} = ${d}`};},
    ()=>{
      const a=rnd(1,2)*(Math.random()>0.5?1:-1),xT=rnd(-4,4),b=-2*a*xT,c=rnd(-5,5);
      const yT=a*xT*xT+b*xT+c;
      const xMin=xT-5,xMax=xT+5;
      const fn=x=>a*x*x+b*x+c;
      const ys=linspace(xMin,xMax,200).map(fn);
      const yMin=Math.min(...ys)-2,yMax=Math.max(...ys)+3;
      const t1=makeFuncTrace(fn,xMin,xMax,'#185FA5');
      const tTop=makeScatterTrace([xT],[yT],'#C0392B',10);
      const graph=plotLines([t1,tTop],[xMin,xMax],[yMin,yMax]);
      return{type:"input",text:`Aflæs x-koordinaten til toppunktet fra grafen.`,graph,answer:String(xT),accept:[String(xT),"x="+xT],explanation:`Toppunktet er ved x = ${xT}.`};
    },
    ()=>{
      const a=rnd(1,2)*(Math.random()>0.5?1:-1),b=rnd(-4,4),c=rnd(-6,6);
      const fn=x=>a*x*x+b*x+c;
      const xs=linspace(-6,6,200),ys=xs.map(fn);
      const yMin=Math.min(...ys)-2,yMax=Math.max(...ys)+2;
      const t1=makeFuncTrace(fn,-6,6,'#185FA5');
      const graph=plotLines([t1],[-6,6],[yMin,yMax]);
      return{type:"mc",text:`Grafen viser et andengradspolynomium. Åbner parablen opad eller nedad?`,graph,options:["Opad (a > 0)","Nedad (a < 0)"],correct:a>0?0:1,explanation:`a = ${a} er ${a>0?"positiv → åbner opad":"negativ → åbner nedad"}.`};
    },
    ()=>{const r1=rnd(-4,4),r2=rnd(-4,4),b=-(r1+r2),c=r1*r2,mn=Math.min(r1,r2);return{type:"input",text:`Bestem det mindste nulpunkt for f(x) = x² ${b>=0?'+ '+b:'− '+Math.abs(b)}x ${c>=0?'+ '+c:'− '+Math.abs(c)}.`,answer:String(mn),accept:[String(mn),"x="+mn],explanation:`Nulpunkterne er ${r1} og ${r2}. Mindste = ${mn}.`};},

    // Angiv minimum med fortolkning
    ()=>{const a=rnd(1,3),xT=rnd(-4,4),b=-2*a*xT,c=rnd(-5,5),yT=a*xT*xT+b*xT+c;return{type:"input",text:`f(x) = ${a}x² ${b>=0?'+ '+b:'− '+Math.abs(b)}x ${c>=0?'+ '+c:'− '+Math.abs(c)}. Hvad er minimumsværdien?`,answer:String(yT),accept:[String(yT)],explanation:`Toppunktet er (${xT}, ${yT}). Da a = ${a} > 0 er det et minimum. Minimumsværdien er f(${xT}) = ${yT}.`};},
    // Fortolk diskriminant
    ()=>{const a=rnd(1,2),b=rnd(-6,6),c=rnd(-5,5),d=b*b-4*a*c;const nulpkt=d>0?"to nulpunkter":d===0?"præcis ét nulpunkt":"ingen nulpunkter";return{type:"mc",text:`For f(x) = ${a}x² ${b>=0?'+ '+b:'− '+Math.abs(b)}x ${c>=0?'+ '+c:'− '+Math.abs(c)} er diskriminanten d = ${d}. Hvad kan konkluderes?`,options:[`Funktionen har ${nulpkt}`,`Funktionen har ${d>0?"ingen":"to"} nulpunkter`,`Funktionen har altid to nulpunkter`,"Funktionen er konstant"],correct:0,explanation:`d = ${d} ${d>0?'> 0 → to nulpunkter':d===0?'= 0 → præcis ét nulpunkt':'< 0 → ingen nulpunkter'}.`};},
    ()=>{const s=[{d:rnd(1,20),ans:0},{d:0,ans:1},{d:-rnd(1,10),ans:2}][rnd(0,2)];return{type:"mc",text:`Diskriminanten er d = ${s.d}. Hvad siges om nulpunkterne?`,options:["To nulpunkter","Præcis ét nulpunkt","Ingen nulpunkter"],correct:s.ans,explanation:["d > 0 → to","d = 0 → ét","d < 0 → ingen"][s.ans]+" nulpunkt(er)."};},
  ],
  F4:[
    ()=>{const a=rnd(-4,4)||1,b=rnd(-5,5),dA=2*a;return{type:"input",text:`Koefficienten foran x i f'(x), når f(x) = ${a}x² ${b>=0?'+ '+b:'− '+Math.abs(b)}x?`,answer:String(dA),accept:[String(dA)],explanation:`f'(x) = ${dA}x ${b>=0?'+ '+b:'− '+Math.abs(b)}.`};},
    ()=>{const a=rnd(-3,3)||1,b=rnd(-5,5),x0=rnd(-4,4),fpx=2*a*x0+b;return{type:"input",text:`Bestem f'(${x0}) for f(x) = ${a}x² ${b>=0?'+ '+b:'− '+Math.abs(b)}x.`,answer:String(fpx),accept:[String(fpx)],explanation:`f'(x) = ${2*a}x ${b>=0?'+ '+b:'− '+Math.abs(b)} → f'(${x0}) = ${fpx}`};},
    ()=>{
      const a=rndF(0.3,0.8,1)*(Math.random()>0.5?1:-1),b=rndF(-2,2,1),c=rndF(-3,3,1);
      const fn=x=>a*x*x*x+b*x*x+c*x;
      const fp=x=>3*a*x*x+2*b*x+c;
      const xs=linspace(-7,8,400);
      const allY=[...xs.map(fn),...xs.map(fp)];
      const yMin=Math.max(Math.min(...allY),-30),yMax=Math.min(Math.max(...allY),30);
      const t1=makeFuncTrace(fn,-7,8,'#185FA5','f(x)');
      const t2=makeFuncTrace(fp,-7,8,'#C0392B',"f'(x)");
      t1.name="f(x)";t2.name="f'(x)";
      const layout=Object.assign({},PLOTLY_LAYOUT_BASE,{
        showlegend:true,legend:{x:0.02,y:0.98,bgcolor:'rgba(255,255,255,0.85)',bordercolor:'#ddd',borderwidth:1},
        xaxis:Object.assign({},PLOTLY_LAYOUT_BASE.xaxis,{range:[-7,8]}),

  const perForloeb = maxCount <= 5 ? 1 : maxCount <= 10 ? 1 : 2;
  sessionQs = [];
  Object.keys(FORLOEB).forEach(key => {
    const gens = shuffle([...GENERATORS[key]]);
    let added = 0, attempts = 0;
    while(added < perForloeb && attempts < perForloeb * 6){
      attempts++;
      try{
        const q = gens[added % gens.length]();
        if(q){ q._forloeb = key; sessionQs.push(q); added++; }
      }catch(e){}
    }
  });
  sessionQs = shuffle(sessionQs);
  qIndex=0; correct=0; wrong=0;
  show("screen-quiz"); renderQuestion();
}

function init(){
  const grid=document.getElementById("forloeb-grid");
  Object.entries(FORLOEB).forEach(([key,name])=>{
    const btn=document.createElement("button");
    btn.className="f-btn"+(key===selected?" active":"");
    btn.innerHTML=`<span style="font-size:11px;color:#888">${key}</span><br>${name}`;
    btn.onclick=()=>selectForloeb(key,btn);
    grid.appendChild(btn);
  });
}
function selectForloeb(key,btn){selected=key;document.querySelectorAll(".f-btn").forEach(b=>b.classList.remove("active"));btn.classList.add("active");}
function setCount(n,btn){maxCount=n;document.querySelectorAll("#count-btns .f-btn").forEach(b=>b.classList.remove("active"));btn.classList.add("active");}
function show(id){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));document.getElementById(id).classList.add("active");}
function goHome(){show("screen-select");}
function generateQuestions(){
  const gens=shuffle([...GENERATORS[selected]]);
  const result=[];let attempts=0;
  while(result.length<maxCount&&attempts<maxCount*6){
    attempts++;
    try{const q=gens[result.length%gens.length]();if(q)result.push(q);}catch(e){}
  }
  return result;
}
function startQuiz(){
  sessionQs=generateQuestions();
  qIndex=0;correct=0;wrong=0;
  show("screen-quiz");renderQuestion();
}
function renderQuestion(){
  answered=false;
  const q=sessionQs[qIndex];
  document.getElementById("progress-fill").style.width=Math.round(qIndex/sessionQs.length*100)+"%";
  document.getElementById("q-counter").textContent=(qIndex+1)+" / "+sessionQs.length;
  document.getElementById("q-forloeb").textContent=FORLOEB[q._forloeb||selected];
  document.getElementById("q-type-label").textContent=q.type==="mc"?"Vælg det rigtige svar":"Skriv dit svar";
  document.getElementById("q-text").textContent=q.text;
  document.getElementById("feedback").className="feedback";
  document.getElementById("next-btn").style.display="none";
  const graphDiv=document.getElementById("q-graph");
  graphDiv.innerHTML="";
  if(q.graph){
    const plotId='plot_'+Date.now();
    const inner=document.createElement('div');
    inner.id=plotId;
    const wrap=document.createElement('div');
    wrap.className='plot-wrap';
    wrap.appendChild(inner);
    graphDiv.appendChild(wrap);
    const spec=q.graph;
    requestAnimationFrame(()=>{
      requestAnimationFrame(()=>{
        if(document.getElementById(plotId)){
          Plotly.newPlot(plotId,spec.traces,spec.layout,PLOTLY_CONFIG);
        }
      });
    });
  }
  const mcDiv=document.getElementById("mc-options");
  const inputDiv=document.getElementById("input-area");
  if(q.type==="mc"){
    inputDiv.style.display="none";mcDiv.innerHTML="";
    q.options.forEach((opt,i)=>{
      const btn=document.createElement("button");btn.className="mc-option";btn.textContent=opt;
      btn.onclick=()=>checkMC(i,btn,q);mcDiv.appendChild(btn);
    });
  } else {
    mcDiv.innerHTML="";inputDiv.style.display="block";
    const inp=document.getElementById("answer-input");inp.value="";inp.disabled=false;
    setTimeout(()=>inp.focus(),150);
  }
}
function checkMC(chosen,btn,q){
  if(answered)return;answered=true;
  document.querySelectorAll(".mc-option").forEach(b=>{b.onclick=null;b.classList.add("disabled");});
  if(chosen===q.correct){btn.classList.remove("disabled");btn.classList.add("correct");showFeedback(true,q.explanation);correct++;}
  else{btn.classList.remove("disabled");btn.classList.add("wrong");document.querySelectorAll(".mc-option")[q.correct].classList.remove("disabled");document.querySelectorAll(".mc-option")[q.correct].classList.add("show-correct");showFeedback(false,"Forkert. "+q.explanation);wrong++;}
  document.getElementById("next-btn").style.display="block";
}
function checkInput(){
  if(answered)return;
  const q=sessionQs[qIndex];
  const val=document.getElementById("answer-input").value.trim().replace(",",".");
  const accepts=q.accept.map(a=>a.replace(",",".").toLowerCase().trim());
  const ok=accepts.includes(val.toLowerCase());
  answered=true;document.getElementById("answer-input").disabled=true;
  if(ok){showFeedback(true,q.explanation);correct++;}
  else{showFeedback(false,"Forkert — svaret er: "+q.answer+". "+q.explanation);wrong++;}
  document.getElementById("next-btn").style.display="block";
}
function showFeedback(ok,msg){
  const fb=document.getElementById("feedback");
  fb.className="feedback "+(ok?"correct":"wrong");
  fb.textContent=(ok?"Rigtigt! ":"")+msg;
}
function nextQuestion(){qIndex++;if(qIndex>=sessionQs.length)showResult();else renderQuestion();}
function showResult(){
  const tot=correct+wrong;
  document.getElementById("res-correct").textContent=correct;
  document.getElementById("res-wrong").textContent=wrong;
  document.getElementById("res-pct").textContent=Math.round(correct/tot*100)+"%";
  show("screen-result");
}
init();
</script>
</body>
</html>
