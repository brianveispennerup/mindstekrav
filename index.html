<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mindstekrav — Matematiktræner</title>
<script src="https://cdn.jsdelivr.net/npm/plotly.js-dist@2.27.0/plotly.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;padding:1.5rem;background:#f5f5f0;min-height:100vh;max-width:700px;margin:0 auto}
.screen{display:none}.screen.active{display:block}
.card{background:#fff;border:1px solid #e0e0d8;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.forloeb-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:10px;margin-top:1rem}
.f-btn{background:#fff;border:1px solid #ccc;border-radius:8px;padding:0.75rem 1rem;cursor:pointer;font-size:13px;font-weight:500;color:#222;text-align:left;transition:background 0.15s;line-height:1.5}
.f-btn:hover{background:#f0f0ec}
.f-btn.active{border:2px solid #185FA5;background:#E6F1FB;color:#0C447C}
.q-label{font-size:11px;color:#888;margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px}
.q-text{font-size:15px;color:#111;line-height:1.75;margin-bottom:1.25rem;white-space:pre-line}
.mc-option{display:block;width:100%;text-align:left;background:#fff;border:1px solid #ddd;border-radius:8px;padding:0.65rem 1rem;margin-bottom:8px;cursor:pointer;font-size:14px;color:#222;transition:all 0.1s}
.mc-option:hover{background:#f5f5f0;border-color:#aaa}
.mc-option.correct{background:#EAF3DE;border:2px solid #3B6D11;color:#27500A;pointer-events:none}
.mc-option.wrong{background:#FCEBEB;border:2px solid #A32D2D;color:#791F1F;pointer-events:none}
.mc-option.show-correct{background:#EAF3DE;border:2px solid #3B6D11;color:#27500A;pointer-events:none}
.mc-option.disabled{pointer-events:none;opacity:0.5}
.input-row{display:flex;gap:8px;align-items:center;margin-bottom:1rem}
.input-row input{flex:1;padding:0.55rem 0.75rem;border:1px solid #ccc;border-radius:8px;font-size:15px;background:#fff;color:#111}
.input-row input:disabled{background:#f5f5f0;color:#888}
.feedback{border-radius:8px;padding:0.75rem 1rem;font-size:14px;margin-bottom:1rem;display:none;line-height:1.6}
.feedback.correct{background:#EAF3DE;color:#27500A;display:block}
.feedback.wrong{background:#FCEBEB;color:#791F1F;display:block}
.score-row{display:flex;gap:12px;margin-bottom:1rem}
.score-box{background:#f5f5f0;border-radius:8px;padding:0.75rem 1rem;flex:1;text-align:center}
.score-box .num{font-size:26px;font-weight:500;color:#111}
.score-box .lbl{font-size:12px;color:#666;margin-top:2px}
button.primary{background:#fff;border:1px solid #ccc;border-radius:8px;padding:0.6rem 1.2rem;font-size:14px;cursor:pointer;color:#222;transition:background 0.15s}
button.primary:hover{background:#f0f0ec}
.progress-bar{height:4px;background:#e8e8e2;border-radius:2px;margin-bottom:1.25rem}
.progress-fill{height:4px;background:#185FA5;border-radius:2px;transition:width 0.3s}
.plot-wrap{margin:0.75rem 0;border:1px solid #e0e0d8;border-radius:8px;overflow:hidden;background:#fff}
h1{font-size:18px;font-weight:600;color:#111;margin-bottom:4px}
.sub{font-size:14px;color:#666;margin-bottom:1rem}
.draw-hint{font-size:13px;color:#666;margin-bottom:6px;}
.draw-points-info{font-size:13px;color:#555;margin-top:6px;min-height:20px;}
</style>
</head>
<body>

<div id="screen-select" class="screen active">
  <div class="card">
    <h1>Mindstekrav</h1>
    <p class="sub">Vælg et forløb.</p>
    <div class="forloeb-grid" id="forloeb-grid"></div>
  </div>
  <div class="card">
    <p style="font-size:13px;color:#666;margin-bottom:8px">Antal opgaver per session</p>
    <div style="display:flex;gap:8px;flex-wrap:wrap" id="count-btns">
      <button class="f-btn active" onclick="setCount(5,this)">5</button>
      <button class="f-btn" onclick="setCount(10,this)">10</button>
      <button class="f-btn" onclick="setCount(15,this)">15</button>
      <button class="f-btn" onclick="setCount(999,this)">Alle</button>
    </div>
  </div>
  <button class="primary" onclick="startQuiz()" style="width:100%;padding:0.8rem;font-size:15px">Start</button>
</div>

<div id="screen-quiz" class="screen">
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <span class="q-label" id="q-forloeb"></span>
      <span style="font-size:12px;color:#888" id="q-counter"></span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <p class="q-label" id="q-type-label"></p>
    <div id="q-graph"></div>
    <p class="q-text" id="q-text"></p>
    <div id="mc-options"></div>
    <div id="input-area" style="display:none">
      <div class="input-row">
        <span id="input-prefix" style="font-size:15px;color:#555;white-space:nowrap;display:none"></span>
        <input type="text" id="answer-input" placeholder="Skriv dit svar..." onkeydown="if(event.key==='Enter')checkInput()">
        <button class="primary" onclick="checkInput()">Tjek</button>
      </div>
    </div>
    <div id="draw-area" style="display:none">
      <p class="draw-hint">Klik to punkter på koordinatsystemet som ligger på grafen.</p>
      <div id="draw-canvas-wrap" class="plot-wrap"></div>
      <p class="draw-points-info" id="draw-points-info">Ingen punkter valgt endnu.</p>
      <div style="display:flex;gap:8px;margin-top:8px">
        <button class="primary" onclick="resetDrawPoints()">Nulstil punkter</button>
        <button class="primary" id="draw-check-btn" onclick="checkDraw()">Tjek linje</button>
      </div>
    </div>
    <div id="fields-area" style="display:none">
      <div id="fields-inputs" style="display:flex;flex-wrap:wrap;align-items:center;gap:6px;margin-bottom:1rem;font-size:15px;color:#555;"></div>
      <button class="primary" onclick="checkFields()">Tjek</button>
    </div>
    <div id="mc2-area" style="display:none">
      <div id="mc2-questions"></div>
      <button class="primary" onclick="checkMC2()" style="margin-top:8px">Tjek</button>
    </div>
    <div class="feedback" id="feedback"></div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="primary" id="next-btn" onclick="nextQuestion()" style="display:none;flex:1">Næste opgave</button>
      <button class="primary" onclick="goHome()" style="font-size:13px;color:#999">Hovedmenu</button>
    </div>
  </div>
</div>

<div id="screen-result" class="screen">
  <div class="card">
    <h1 style="margin-bottom:1rem">Resultat</h1>
    <div class="score-row">
      <div class="score-box"><div class="num" id="res-correct">0</div><div class="lbl">Rigtige</div></div>
      <div class="score-box"><div class="num" id="res-wrong">0</div><div class="lbl">Forkerte</div></div>
      <div class="score-box"><div class="num" id="res-pct">0%</div><div class="lbl">Score</div></div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="primary" onclick="startQuiz()" style="flex:1">Prøv igen</button>
      <button class="primary" onclick="goHome()" style="flex:1">Hovedmenu</button>
    </div>
  </div>
</div>

<!-- ===================== ENGINE ===================== -->
<script>
// ---- Forløb navne ----
const FORLOEB = {
  F0: "Grundlæggende færdigheder",
  F1: "Lineære funktioner",
  F2: "Eksponentielle funktioner",
  F3: "Deskriptiv statistik",
  F4: "Finansiel regning",
  F5: "Andengradsfunktioner"
};

// ---- Hjælpefunktioner ----
function rnd(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }
function rndF(a, b, d) { return parseFloat((Math.random() * (b - a) + a).toFixed(d)); }
function shuffle(a) { let r = [...a]; for (let i = r.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [r[i], r[j]] = [r[j], r[i]]; } return r; }
function fmt(n) { return String(n).replace('.', ','); }
function linspace(a, b, n) { return Array.from({ length: n }, (_, i) => a + (b - a) * i / (n - 1)); }

// ---- Plotly hjælpere ----
const PLOTLY_CONFIG = { responsive: true, displayModeBar: false };
const PLOTLY_LAYOUT_BASE = {
  margin: { l: 50, r: 20, t: 20, b: 50 },
  plot_bgcolor: '#fafaf8', paper_bgcolor: '#fff',
  font: { family: 'system-ui', size: 12, color: '#555' },
  xaxis: { gridcolor: '#e8e8e2', zerolinecolor: '#aaa', zerolinewidth: 1.5 },
  yaxis: { gridcolor: '#e8e8e2', zerolinecolor: '#aaa', zerolinewidth: 1.5 },
  showlegend: false, height: 280
};
function makePlotSpec(traces, layout) { return { traces, layout }; }
function plotLines(traces, xrange, yrange) {
  return makePlotSpec(traces, Object.assign({}, PLOTLY_LAYOUT_BASE, {
    xaxis: Object.assign({}, PLOTLY_LAYOUT_BASE.xaxis, { range: xrange }),
    yaxis: Object.assign({}, PLOTLY_LAYOUT_BASE.yaxis, { range: yrange })
  }));
}
function makeFuncTrace(fn, xMin, xMax, color) {
  const xs = linspace(xMin, xMax, 400);
  return { x: xs, y: xs.map(fn), mode: 'lines', line: { color: color || '#185FA5', width: 2.5 } };
}
function makeBarTrace(xs, ys, color) {
  return { x: xs, y: ys, type: 'bar', marker: { color: color || '#B5D4F4', line: { color: '#185FA5', width: 1 } }, width: 0.5 };
}
function makeScatterTrace(xs, ys, color, size) {
  return { x: xs, y: ys, mode: 'markers', marker: { color: color || '#C0392B', size: size || 8 } };
}

// ---- Generators objekt — fyldes af forloeb-filerne ----
const GENERATORS = {};
</script>

<!-- ===================== FORLØB ===================== -->
<script src="forloeb/f0.js"></script>
<script src="forloeb/f1.js"></script>
<script src="forloeb/f2.js"></script>
<script src="forloeb/f3.js"></script>
<script src="forloeb/f4.js"></script>
<script src="forloeb/f5.js"></script>

<!-- ===================== SPILMOTOR ===================== -->
<script>
// ---- Draw state ----
let drawState = { a: 0, b: 0, pts: [], plotId: '', xRange: [-6, 6], yRange: [-12, 12] };

function initDrawCanvas(a, b, range) {
  range = range || 5;
  drawState.a = a; drawState.b = b; drawState.pts = [];
  drawState.xRange = [-range, range]; drawState.yRange = [-range, range];
  drawState.range = range;

  const wrap = document.getElementById('draw-canvas-wrap');
  wrap.innerHTML = '';
  const canvas = document.createElement('canvas');
  canvas.id = 'drawCanvas';
  canvas.style.cssText = 'width:100%;height:320px;display:block;cursor:crosshair;touch-action:none;';
  wrap.appendChild(canvas);

  // Sæt canvas størrelse
  const size = Math.min(wrap.clientWidth || 400, 500);
  canvas.width = size; canvas.height = size;
  drawState.canvas = canvas;
  drawState.size = size;

  drawGrid();

  function getCoords(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    let cx, cy;
    if (e.touches) {
      cx = (e.touches[0].clientX - rect.left) * scaleX;
      cy = (e.touches[0].clientY - rect.top) * scaleY;
    } else {
      cx = (e.clientX - rect.left) * scaleX;
      cy = (e.clientY - rect.top) * scaleY;
    }
    const margin = 40;
    const plotW = canvas.width - margin * 2;
    const plotH = canvas.height - margin * 2;
    const mx = Math.round(((cx - margin) / plotW) * (range * 2) - range);
    const my = Math.round(range - ((cy - margin) / plotH) * (range * 2));
    return { x: mx, y: my };
  }

  function handleClick(e) {
    if (answered || drawState.pts.length >= 2) return;
    e.preventDefault();
    const pt = getCoords(e);
    if (pt.x < -range || pt.x > range || pt.y < -range || pt.y > range) return;
    drawState.pts.push(pt);
    drawGrid();
    const info = document.getElementById('draw-points-info');
    if (drawState.pts.length === 1) info.textContent = `Punkt 1: (${pt.x}, ${pt.y}). Klik endnu et punkt.`;
    if (drawState.pts.length === 2) info.textContent = `Punkt 1: (${drawState.pts[0].x}, ${drawState.pts[0].y}), Punkt 2: (${pt.x}, ${pt.y}).`;
  }

  canvas.addEventListener('click', handleClick);
  canvas.addEventListener('touchend', function(e) {
    e.preventDefault();
    handleClick(e.changedTouches ? { clientX: e.changedTouches[0].clientX, clientY: e.changedTouches[0].clientY, preventDefault: ()=>{} } : e);
  }, { passive: false });
}

function drawGrid() {
  const canvas = drawState.canvas;
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const size = canvas.width;
  const margin = 40;
  const range = drawState.range || 5;
  const plotW = size - margin * 2;
  const plotH = size - margin * 2;

  function toCanvas(mx, my) {
    return {
      x: margin + ((mx + range) / (range * 2)) * plotW,
      y: margin + ((range - my) / (range * 2)) * plotH
    };
  }

  ctx.clearRect(0, 0, size, size);

  // Baggrund
  ctx.fillStyle = '#fafaf8';
  ctx.fillRect(margin, margin, plotW, plotH);

  // Grid
  ctx.strokeStyle = '#e8e8e2';
  ctx.lineWidth = 1;
  for (let i = -range; i <= range; i++) {
    const { x } = toCanvas(i, 0);
    const { y } = toCanvas(0, i);
    ctx.beginPath(); ctx.moveTo(x, margin); ctx.lineTo(x, margin + plotH); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(margin, y); ctx.lineTo(margin + plotW, y); ctx.stroke();
  }

  // Akser
  ctx.strokeStyle = '#888'; ctx.lineWidth = 1.5;
  const o = toCanvas(0, 0);
  ctx.beginPath(); ctx.moveTo(margin, o.y); ctx.lineTo(margin + plotW, o.y); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(o.x, margin); ctx.lineTo(o.x, margin + plotH); ctx.stroke();

  // Tal på akserne
  ctx.fillStyle = '#555'; ctx.font = '11px system-ui'; ctx.textAlign = 'center';
  for (let i = -range; i <= range; i++) {
    if (i === 0) continue;
    const { x } = toCanvas(i, 0);
    ctx.fillText(i, x, margin + plotH + 14);
    const { y } = toCanvas(0, i);
    ctx.textAlign = 'right';
    ctx.fillText(i, margin - 4, y + 4);
    ctx.textAlign = 'center';
  }

  // Tegn elevens punkter og linje
  const pts = drawState.pts;
  if (pts.length >= 1) {
    pts.forEach(pt => {
      const c = toCanvas(pt.x, pt.y);
      ctx.fillStyle = '#C0392B';
      ctx.beginPath(); ctx.arc(c.x, c.y, 6, 0, Math.PI * 2); ctx.fill();
    });
  }
  if (pts.length === 2) {
    const c1 = toCanvas(pts[0].x, pts[0].y);
    const c2 = toCanvas(pts[1].x, pts[1].y);
    ctx.strokeStyle = '#C0392B'; ctx.lineWidth = 2;
    // Forlæng linjen til kanten
    if (pts[0].x !== pts[1].x) {
      const slope = (pts[1].y - pts[0].y) / (pts[1].x - pts[0].x);
      const yLeft = pts[0].y + slope * (-range - pts[0].x);
      const yRight = pts[0].y + slope * (range - pts[0].x);
      const cl = toCanvas(-range, yLeft), cr = toCanvas(range, yRight);
      ctx.beginPath(); ctx.moveTo(cl.x, cl.y); ctx.lineTo(cr.x, cr.y); ctx.stroke();
    } else {
      ctx.beginPath(); ctx.moveTo(c1.x, margin); ctx.lineTo(c1.x, margin + plotH); ctx.stroke();
    }
  }
}

function updateDrawPlot() { drawGrid(); }

function resetDrawPoints() {
  if (answered) return;
  drawState.pts = [];
  document.getElementById('draw-points-info').textContent = 'Ingen punkter valgt endnu.';
  drawGrid();
}

function checkDraw() {
  if (answered || drawState.pts.length < 2) return;
  answered = true;
  const pts = drawState.pts, a = drawState.a, b = drawState.b;
  const tol = 0.7;
  const ok1 = Math.abs(pts[0].y - (a * pts[0].x + b)) <= tol;
  const ok2 = Math.abs(pts[1].y - (a * pts[1].x + b)) <= tol;
  let slopeOk = false;
  if (pts[0].x !== pts[1].x) {
    const s = (pts[1].y - pts[0].y) / (pts[1].x - pts[0].x);
    slopeOk = Math.abs(s - a) <= 0.7;
  }
  const ok = (ok1 && ok2) || slopeOk;

  // Tegn korrekt linje i blåt
  const canvas = drawState.canvas;
  const ctx = canvas.getContext('2d');
  const size = canvas.width, margin = 40, range = drawState.range || 5;
  const plotW = size - margin * 2;
  const plotH = size - margin * 2;
  function toCanvas(mx, my) {
    return { x: margin + ((mx + range) / (range * 2)) * plotW, y: margin + ((range - my) / (range * 2)) * plotH };
  }
  const yLeft = a * (-range) + b, yRight = a * range + b;
  const cl = toCanvas(-range, yLeft), cr = toCanvas(range, yRight);
  ctx.strokeStyle = '#185FA5'; ctx.lineWidth = 2.5;
  ctx.setLineDash([6, 4]);
  ctx.beginPath(); ctx.moveTo(cl.x, cl.y); ctx.lineTo(cr.x, cr.y); ctx.stroke();
  ctx.setLineDash([]);

  const expl = (ok ? '' : 'Den stiplede blå linje viser den korrekte graf. ') +
    `a = ${a} er hældningen — grafen ${a > 0 ? 'stiger' : 'falder'} ${Math.abs(a)} for hver enhed ad x-aksen. ` +
    `b = ${b} er skæringen med y-aksen: grafen skærer y-aksen i punktet (0, ${b}).`;
  showFeedback(ok, expl);
  if (ok) correct_count++; else wrong_count++;
  document.getElementById("next-btn").style.display = "block";
}

// ---- Quiz state ----
let selected = "F0", sessionQs = [], qIndex = 0, correct_count = 0, wrong_count = 0, maxCount = 5, answered = false;

function startAllForloeb() {
  const perForloeb = maxCount <= 5 ? 1 : maxCount <= 10 ? 1 : 2;
  sessionQs = [];
  Object.keys(FORLOEB).forEach(key => {
    const gens = shuffle([...GENERATORS[key]]);
    let added = 0, attempts = 0;
    while (added < perForloeb && attempts < perForloeb * 6) {
      attempts++;
      try { const q = gens[added % gens.length](); if (q) { q._forloeb = key; sessionQs.push(q); added++; } } catch (e) { }
    }
  });
  sessionQs = shuffle(sessionQs);
  qIndex = 0; correct_count = 0; wrong_count = 0;
  show("screen-quiz"); renderQuestion();
}

function init() {
  const grid = document.getElementById("forloeb-grid");
  Object.entries(FORLOEB).forEach(([key, name]) => {
    const btn = document.createElement("button");
    btn.className = "f-btn" + (key === selected ? " active" : "");
    btn.innerHTML = `<span style="font-size:11px;color:#888">${key}</span><br>${name}`;
    btn.onclick = () => selectForloeb(key, btn);
    grid.appendChild(btn);
  });
}
function selectForloeb(key, btn) { selected = key; document.querySelectorAll(".f-btn").forEach(b => b.classList.remove("active")); btn.classList.add("active"); }
function setCount(n, btn) { maxCount = n; document.querySelectorAll("#count-btns .f-btn").forEach(b => b.classList.remove("active")); btn.classList.add("active"); }
function show(id) { document.querySelectorAll(".screen").forEach(s => s.classList.remove("active")); document.getElementById(id).classList.add("active"); }
function goHome() { show("screen-select"); }
function generateQuestions() {
  const gens = [...GENERATORS[selected]];
  if (maxCount === 999) {
    // Alle: én opgave fra hver generator, i tilfældig rækkefølge
    const result = [];
    shuffle(gens).forEach(gen => {
      try { const q = gen(); if (q) result.push(q); } catch (e) { }
    });
    return result;
  }
  const shuffled = shuffle(gens);
  const result = []; let attempts = 0;
  while (result.length < maxCount && attempts < maxCount * 10) {
    attempts++;
    try { const q = shuffled[result.length % shuffled.length](); if (q) result.push(q); } catch (e) { }
  }
  return result;
}
function startQuiz() {
  sessionQs = generateQuestions(); qIndex = 0; correct_count = 0; wrong_count = 0;
  show("screen-quiz"); renderQuestion();
}
function renderQuestion() {
  answered = false;
  const q = sessionQs[qIndex];
  document.getElementById("progress-fill").style.width = Math.round(qIndex / sessionQs.length * 100) + "%";
  document.getElementById("q-counter").textContent = (qIndex + 1) + " / " + sessionQs.length;
  document.getElementById("q-forloeb").textContent = FORLOEB[q._forloeb || selected];
  document.getElementById("q-type-label").textContent = q.type === "mc" || q.type === "mc2" ? "Vælg det rigtige svar" : q.type === "draw" ? "Tegn grafen" : "Skriv dit svar";
  document.getElementById("q-text").textContent = q.text;
  document.getElementById("feedback").className = "feedback";
  document.getElementById("next-btn").style.display = "none";
  const graphDiv = document.getElementById("q-graph");
  graphDiv.innerHTML = "";
  if (q.graph) {
    const plotId = 'plot_' + Date.now();
    const inner = document.createElement('div'); inner.id = plotId;
    const wrap = document.createElement('div'); wrap.className = 'plot-wrap'; wrap.appendChild(inner);
    graphDiv.appendChild(wrap);
    requestAnimationFrame(() => requestAnimationFrame(() => {
      if (document.getElementById(plotId)) Plotly.newPlot(plotId, q.graph.traces, q.graph.layout, PLOTLY_CONFIG);
    }));
  }
  const mcDiv = document.getElementById("mc-options");
  const inputDiv = document.getElementById("input-area");
  const drawDiv = document.getElementById("draw-area");
  const fieldsDiv = document.getElementById("fields-area");
  const mc2Div = document.getElementById("mc2-area");
  mcDiv.innerHTML = ""; inputDiv.style.display = "none"; drawDiv.style.display = "none"; fieldsDiv.style.display = "none"; mc2Div.style.display = "none";
  if (q.type === "mc") {
    q.options.forEach((opt, i) => {
      const btn = document.createElement("button"); btn.className = "mc-option"; btn.textContent = opt;
      btn.onclick = () => checkMC(i, btn, q); mcDiv.appendChild(btn);
    });
  } else if (q.type === "draw") {
    drawDiv.style.display = "block";
    document.getElementById('draw-check-btn').style.display = 'block';
    document.getElementById('draw-points-info').textContent = 'Ingen punkter valgt endnu.';
    requestAnimationFrame(() => requestAnimationFrame(() => initDrawCanvas(q.drawA, q.drawB, q.drawRange || 5)));
  } else if (q.type === "mc2") {
    mc2Div.style.display = "block";
    const container = document.getElementById("mc2-questions");
    container.innerHTML = "";
    q.questions.forEach((qq, qi) => {
      const block = document.createElement("div");
      block.style.cssText = "margin-bottom:1rem;";
      const lbl = document.createElement("p");
      lbl.style.cssText = "font-size:14px;font-weight:500;color:#333;margin-bottom:6px;";
      lbl.textContent = qq.label;
      block.appendChild(lbl);
      qq.options.forEach((opt, oi) => {
        const btn = document.createElement("button");
        btn.className = "mc-option";
        btn.textContent = opt;
        btn.id = `mc2_${qi}_${oi}`;
        btn.dataset.qi = qi; btn.dataset.oi = oi; btn.dataset.selected = "false";
        btn.onclick = () => {
          if (answered) return;
          // Deselect others in same group
          qq.options.forEach((_, k) => {
            const b = document.getElementById(`mc2_${qi}_${k}`);
            if (b) { b.dataset.selected = "false"; b.style.borderColor = "#ddd"; b.style.background = "#fff"; }
          });
          btn.dataset.selected = "true";
          btn.style.borderColor = "#185FA5"; btn.style.background = "#E6F1FB";
        };
        block.appendChild(btn);
      });
      container.appendChild(block);
    });
  } else if (q.type === "fields") {
    fieldsDiv.style.display = "block";
    const container = document.getElementById("fields-inputs");
    container.innerHTML = "";
    q.fields.forEach((f, i) => {
      if (f.prefix) {
        const lbl = document.createElement("span"); lbl.textContent = f.prefix + " ";
        container.appendChild(lbl);
      }
      const inp = document.createElement("input");
      inp.type = "text"; inp.id = "field_" + i;
      inp.style.cssText = "width:60px;padding:0.4rem 0.5rem;border:1px solid #ccc;border-radius:6px;font-size:15px;";
      inp.onkeydown = (e) => { if (e.key === 'Enter') checkFields(); };
      container.appendChild(inp);
      if (f.suffix) {
        const suf = document.createElement("span"); suf.textContent = " " + f.suffix + " ";
        container.appendChild(suf);
      }
    });
    setTimeout(() => { const f = document.getElementById("field_0"); if (f) f.focus(); }, 150);
  } else {
    inputDiv.style.display = "block";
    const prefix = document.getElementById("input-prefix");
    if (q.prefix) { prefix.textContent = q.prefix; prefix.style.display = "inline"; }
    else { prefix.textContent = ''; prefix.style.display = "none"; }
    const inp = document.getElementById("answer-input"); inp.value = ""; inp.disabled = false;
    setTimeout(() => inp.focus(), 150);
  }
}
function checkMC(chosen, btn, q) {
  if (answered) return; answered = true;
  document.querySelectorAll(".mc-option").forEach(b => { b.onclick = null; b.classList.add("disabled"); });
  if (chosen === q.correct) { btn.classList.remove("disabled"); btn.classList.add("correct"); showFeedback(true, q.explanation); correct_count++; }
  else { btn.classList.remove("disabled"); btn.classList.add("wrong"); document.querySelectorAll(".mc-option")[q.correct].classList.remove("disabled"); document.querySelectorAll(".mc-option")[q.correct].classList.add("show-correct"); showFeedback(false, "Forkert. " + q.explanation); wrong_count++; }
  document.getElementById("next-btn").style.display = "block";
}
function normalizeAnswer(s) {
  return s.toLowerCase().trim()
    .replace(/\s+/g, '')         // fjern alle mellemrum
    .replace(/−/g, '-')          // unicode minus → bindestreg
    .replace(/–/g, '-')          // tankestreg → bindestreg
    .replace(/\*·/g, '')         // fjern gangetegn (7*x → 7x)
    .replace(/\*/g, '')          // fjern *
    .replace(/·/g, '');          // fjern ·
}
function checkMC2() {
  if (answered) return;
  const q = sessionQs[qIndex];
  let allAnswered = true, allCorrect = true;
  q.questions.forEach((qq, qi) => {
    const selected = qq.options.findIndex((_, oi) => {
      const b = document.getElementById(`mc2_${qi}_${oi}`);
      return b && b.dataset.selected === "true";
    });
    if (selected === -1) { allAnswered = false; return; }
    const correct = selected === qq.correct;
    if (!correct) allCorrect = false;
    qq.options.forEach((_, oi) => {
      const b = document.getElementById(`mc2_${qi}_${oi}`);
      if (!b) return;
      b.onclick = null; b.classList.add("disabled");
      if (oi === qq.correct) { b.classList.remove("disabled"); b.classList.add("show-correct"); }
      else if (oi === selected && !correct) { b.classList.remove("disabled"); b.classList.add("wrong"); }
    });
  });
  if (!allAnswered) {
    showFeedback(false, "Vælg et svar for hver funktion.");
    return;
  }
  answered = true;
  if (allCorrect) { showFeedback(true, q.explanation); correct_count++; }
  else { showFeedback(false, "Ikke helt rigtigt. " + q.explanation); wrong_count++; }
  document.getElementById("next-btn").style.display = "block";
}
function checkFields() {
  if (answered) return;
  const q = sessionQs[qIndex];
  let allOk = true;
  q.fields.forEach((f, i) => {
    const inp = document.getElementById("field_" + i);
    if (inp) inp.disabled = true;
    const val = inp ? normalizeAnswer(inp.value.replace(",", ".")) : "";
    const expected = normalizeAnswer(q.answers[i].replace(",", "."));
    if (val !== expected) allOk = false;
  });
  answered = true;
  if (allOk) { showFeedback(true, q.explanation); correct_count++; }
  else {
    const correct = q.answers.join(", ");
    showFeedback(false, `Forkert — svarene er: ${correct}. ${q.explanation}`);
    wrong_count++;
  }
  document.getElementById("next-btn").style.display = "block";
}
function checkInput() {
  if (answered) return;
  const q = sessionQs[qIndex];
  const val = normalizeAnswer(document.getElementById("answer-input").value.replace(",", "."));
  const accepts = q.accept.map(a => normalizeAnswer(a.replace(",", ".")));
  const ok = accepts.includes(val);
  answered = true; document.getElementById("answer-input").disabled = true;
  if (ok) { showFeedback(true, q.explanation); correct_count++; }
  else { showFeedback(false, "Forkert — svaret er: " + q.answer + ". " + q.explanation); wrong_count++; }
  document.getElementById("next-btn").style.display = "block";
}
function showFeedback(ok, msg) {
  const fb = document.getElementById("feedback");
  fb.className = "feedback " + (ok ? "correct" : "wrong");
  fb.textContent = (ok ? "Rigtigt! " : "") + msg;
}
function nextQuestion() { qIndex++; if (qIndex >= sessionQs.length) showResult(); else renderQuestion(); }
function showResult() {
  const tot = correct_count + wrong_count;
  document.getElementById("res-correct").textContent = correct_count;
  document.getElementById("res-wrong").textContent = wrong_count;
  document.getElementById("res-pct").textContent = (tot > 0 ? Math.round(correct_count / tot * 100) : 0) + "%";
  show("screen-result");
}
init();
</script>
