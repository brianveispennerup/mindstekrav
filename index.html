<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mindstekrav — Matematiktræner</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;padding:1.5rem;background:#f5f5f0;min-height:100vh;max-width:680px;margin:0 auto}
.screen{display:none}.screen.active{display:block}
.card{background:#fff;border:1px solid #e0e0d8;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.forloeb-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-top:1rem}
.f-btn{background:#fff;border:1px solid #ccc;border-radius:8px;padding:0.75rem 1rem;cursor:pointer;font-size:13px;font-weight:500;color:#222;text-align:left;transition:background 0.15s;line-height:1.4}
.f-btn:hover{background:#f0f0ec}
.f-btn.active{border:2px solid #185FA5;background:#E6F1FB;color:#0C447C}
.q-label{font-size:12px;color:#666;margin-bottom:6px;font-weight:500;text-transform:uppercase;letter-spacing:0.5px}
.q-text{font-size:15px;color:#111;line-height:1.7;margin-bottom:1.25rem}
.mc-option{display:block;width:100%;text-align:left;background:#fff;border:1px solid #ccc;border-radius:8px;padding:0.6rem 1rem;margin-bottom:8px;cursor:pointer;font-size:14px;color:#222;transition:background 0.1s}
.mc-option:hover{background:#f0f0ec}
.mc-option.correct{background:#EAF3DE;border:2px solid #3B6D11;color:#27500A;pointer-events:none}
.mc-option.wrong{background:#FCEBEB;border:2px solid #A32D2D;color:#791F1F;pointer-events:none}
.mc-option.show-correct{background:#EAF3DE;border:2px solid #3B6D11;color:#27500A;pointer-events:none}
.mc-option.disabled{pointer-events:none;opacity:0.55}
.input-row{display:flex;gap:8px;align-items:center;margin-bottom:1rem}
.input-row input{flex:1;padding:0.5rem 0.75rem;border:1px solid #ccc;border-radius:8px;font-size:15px;background:#fff;color:#111}
.input-row input:disabled{background:#f5f5f0;color:#888}
.feedback{border-radius:8px;padding:0.75rem 1rem;font-size:14px;margin-bottom:1rem;display:none;line-height:1.6}
.feedback.correct{background:#EAF3DE;color:#27500A;display:block}
.feedback.wrong{background:#FCEBEB;color:#791F1F;display:block}
.score-row{display:flex;gap:12px;margin-bottom:1rem}
.score-box{background:#f5f5f0;border-radius:8px;padding:0.75rem 1rem;flex:1;text-align:center}
.score-box .num{font-size:24px;font-weight:500;color:#111}
.score-box .lbl{font-size:12px;color:#666}
button.primary{background:#fff;border:1px solid #ccc;border-radius:8px;padding:0.6rem 1.2rem;font-size:14px;cursor:pointer;color:#222;transition:background 0.15s}
button.primary:hover{background:#f0f0ec}
.graph-wrap{margin:1rem 0;border:1px solid #e0e0d8;border-radius:8px;overflow:hidden;background:#fff}
canvas{display:block}
.progress-bar{height:4px;background:#e0e0d8;border-radius:2px;margin-bottom:1.25rem}
.progress-fill{height:4px;background:#185FA5;border-radius:2px;transition:width 0.3s}
h1{font-size:18px;font-weight:500;color:#111;margin-bottom:4px}
.sub{font-size:14px;color:#666;margin-bottom:1rem}
table.freq-table{width:100%;border-collapse:collapse;font-size:14px;margin:1rem 0}
table.freq-table th{background:#f5f5f0;padding:6px 10px;text-align:left;border:1px solid #e0e0d8;font-weight:500}
table.freq-table td{padding:6px 10px;border:1px solid #e0e0d8}
</style>
</head>
<body>

<div id="screen-select" class="screen active">
  <div class="card">
    <h1>Mindstekrav — matematiktræner</h1>
    <p class="sub">Vælg et forløb. Opgaverne genereres med tilfældige tal og grafer hver gang.</p>
    <div class="forloeb-grid" id="forloeb-grid"></div>
  </div>
  <div class="card">
    <p style="font-size:13px;color:#666;margin-bottom:8px">Antal opgaver per session</p>
    <div style="display:flex;gap:8px;flex-wrap:wrap" id="count-btns">
      <button class="f-btn active" onclick="setCount(5,this)">5</button>
      <button class="f-btn" onclick="setCount(10,this)">10</button>
      <button class="f-btn" onclick="setCount(15,this)">15</button>
    </div>
  </div>
  <button class="primary" onclick="startQuiz()" style="width:100%;padding:0.75rem;font-size:15px">Start træning</button>
</div>

<div id="screen-quiz" class="screen">
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <span class="q-label" id="q-forloeb"></span>
      <span style="font-size:12px;color:#666" id="q-counter"></span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <p class="q-label" id="q-type-label"></p>
    <div id="q-extra"></div>
    <p class="q-text" id="q-text"></p>
    <div id="mc-options"></div>
    <div id="input-area" style="display:none">
      <div class="input-row">
        <input type="text" id="answer-input" placeholder="Skriv dit svar..." onkeydown="if(event.key==='Enter')checkInput()">
        <button class="primary" onclick="checkInput()">Tjek</button>
      </div>
    </div>
    <div class="feedback" id="feedback"></div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="primary" id="next-btn" onclick="nextQuestion()" style="display:none;flex:1">Næste opgave</button>
      <button class="primary" onclick="goHome()" style="font-size:13px;color:#888">Afslut</button>
    </div>
  </div>
</div>

<div id="screen-result" class="screen">
  <div class="card">
    <h1 style="margin-bottom:1rem">Resultat</h1>
    <div class="score-row">
      <div class="score-box"><div class="num" id="res-correct">0</div><div class="lbl">Rigtige</div></div>
      <div class="score-box"><div class="num" id="res-wrong">0</div><div class="lbl">Forkerte</div></div>
      <div class="score-box"><div class="num" id="res-pct">0%</div><div class="lbl">Score</div></div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="primary" onclick="startQuiz()" style="flex:1">Prøv igen</button>
      <button class="primary" onclick="goHome()" style="flex:1">Vælg forløb</button>
    </div>
  </div>
</div>

<script>
const FORLOEB={F1:"Lineære funktioner",F2:"Eksponentielle funktioner",F3:"Andengradsfunktioner",F4:"Differentialregning",F5:"Finansiel regning",F6:"Beskrivende statistik",F7:"Sandsynlighedsregning",F8:"Hypotesetest og konfidensintervaller"};

function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function rndF(a,b,d){return parseFloat((Math.random()*(b-a)+a).toFixed(d));}
function shuffle(a){let r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}
function fmt(n){return String(n).replace('.',',');}
function fak(n){return n<=1?1:n*fak(n-1);}

// --- GRAPH HELPERS ---
function makeCanvas(w,h){
  const c=document.createElement('canvas');
  c.width=w;c.height=h;c.style.width='100%';
  return c;
}

function drawAxes(ctx,W,H,xMin,xMax,yMin,yMax){
  const px=(x)=>Math.round((x-xMin)/(xMax-xMin)*W);
  const py=(y)=>Math.round(H-(y-yMin)/(yMax-yMin)*H);
  ctx.strokeStyle='#ccc';ctx.lineWidth=0.5;
  // grid
  for(let x=Math.ceil(xMin);x<=xMax;x++){ctx.beginPath();ctx.moveTo(px(x),0);ctx.lineTo(px(x),H);ctx.stroke();}
  for(let y=Math.ceil(yMin);y<=yMax;y++){ctx.beginPath();ctx.moveTo(0,py(y));ctx.lineTo(W,py(y));ctx.stroke();}
  // axes
  ctx.strokeStyle='#666';ctx.lineWidth=1.5;
  if(yMin<=0&&yMax>=0){ctx.beginPath();ctx.moveTo(0,py(0));ctx.lineTo(W,py(0));ctx.stroke();}
  if(xMin<=0&&xMax>=0){ctx.beginPath();ctx.moveTo(px(0),0);ctx.lineTo(px(0),H);ctx.stroke();}
  // labels
  ctx.fillStyle='#888';ctx.font='11px system-ui';ctx.textAlign='center';
  for(let x=Math.ceil(xMin);x<=xMax;x+=Math.ceil((xMax-xMin)/8)){
    if(x===0)continue;
    const ypos=yMin<=0&&yMax>=0?py(0)+13:H-4;
    ctx.fillText(x,px(x),ypos);
  }
  ctx.textAlign='right';
  for(let y=Math.ceil(yMin);y<=yMax;y+=Math.ceil((yMax-yMin)/6)){
    if(y===0)continue;
    const xpos=xMin<=0&&xMax>=0?px(0)-4:30;
    ctx.fillText(y,xpos,py(y)+4);
  }
  return {px,py};
}

function plotFunc(ctx,fn,xMin,xMax,px,py,color,steps){
  ctx.strokeStyle=color;ctx.lineWidth=2;ctx.beginPath();
  let first=true;
  for(let i=0;i<=(steps||300);i++){
    const x=xMin+(xMax-xMin)*i/(steps||300);
    const y=fn(x);
    if(!isFinite(y))continue;
    if(first){ctx.moveTo(px(x),py(y));first=false;}
    else ctx.lineTo(px(x),py(y));
  }
  ctx.stroke();
}

// Draw sumkurve (ogive)
function drawSumkurve(ages,cumFreqs,answer){
  const W=580,H=260;
  const c=makeCanvas(W,H);
  const ctx=c.getContext('2d');
  ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);
  const pad={l:45,r:20,t:20,b:35};
  const iW=W-pad.l-pad.r,iH=H-pad.t-pad.b;
  // axes
  ctx.strokeStyle='#aaa';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(pad.l,pad.t);ctx.lineTo(pad.l,pad.t+iH);ctx.lineTo(pad.l+iW,pad.t+iH);ctx.stroke();
  // grid
  ctx.strokeStyle='#eee';ctx.lineWidth=0.5;
  for(let y=0;y<=100;y+=10){
    const yp=pad.t+iH-(y/100)*iH;
    ctx.beginPath();ctx.moveTo(pad.l,yp);ctx.lineTo(pad.l+iW,yp);ctx.stroke();
    ctx.fillStyle='#888';ctx.font='11px system-ui';ctx.textAlign='right';
    ctx.fillText(y,pad.l-6,yp+4);
  }
  const n=ages.length;
  const xScale=(x)=>pad.l+(x-ages[0])/(ages[n-1]-ages[0])*iW;
  const yScale=(y)=>pad.t+iH-(y/100)*iH;
  // x labels
  ctx.fillStyle='#888';ctx.font='11px system-ui';ctx.textAlign='center';
  ages.forEach(a=>ctx.fillText(a,xScale(a),pad.t+iH+16));
  // plot
  ctx.strokeStyle='#185FA5';ctx.lineWidth=2;ctx.beginPath();
  ages.forEach((a,i)=>{
    if(i===0)ctx.moveTo(xScale(a),yScale(cumFreqs[i]));
    else ctx.lineTo(xScale(a),yScale(cumFreqs[i]));
  });
  ctx.stroke();
  // dots
  ages.forEach((a,i)=>{
    ctx.fillStyle='#185FA5';ctx.beginPath();
    ctx.arc(xScale(a),yScale(cumFreqs[i]),4,0,Math.PI*2);ctx.fill();
  });
  // quartile lines (shown after answer)
  ctx.strokeStyle='rgba(200,0,0,0.25)';ctx.lineWidth=1;ctx.setLineDash([4,3]);
  [25,50,75].forEach(q=>{
    ctx.beginPath();ctx.moveTo(pad.l,yScale(q));ctx.lineTo(pad.l+iW,yScale(q));ctx.stroke();
    ctx.fillStyle='rgba(200,0,0,0.5)';ctx.font='10px system-ui';ctx.textAlign='left';
    ctx.fillText('Q'+([25,50,75].indexOf(q)+1),pad.l+2,yScale(q)-3);
  });
  ctx.setLineDash([]);
  // axis titles
  ctx.fillStyle='#666';ctx.font='11px system-ui';ctx.textAlign='center';
  ctx.fillText('Alder',pad.l+iW/2,H-2);
  ctx.save();ctx.translate(12,pad.t+iH/2);ctx.rotate(-Math.PI/2);
  ctx.fillText('Summeret frekvens (%)',0,0);ctx.restore();
  return c;
}

// Draw exponential graph for reading T2
function drawExpGraph(b,a,xMin,xMax){
  const W=560,H=240;
  const c=makeCanvas(W,H);
  const ctx=c.getContext('2d');
  ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);
  const fn=x=>b*Math.pow(a,x);
  const yMax=fn(xMax)*1.1, yMin=0;
  const {px,py}=drawAxes(ctx,W,H,xMin,xMax,yMin,yMax);
  plotFunc(ctx,fn,xMin,xMax,px,py,'#185FA5');
  return c;
}

// Draw parabola
function drawParabola(a,b,c,xMin,xMax){
  const W=560,H=240;
  const cv=makeCanvas(W,H);
  const ctx=cv.getContext('2d');
  ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);
  const fn=x=>a*x*x+b*x+c;
  const xs=Array.from({length:200},(_,i)=>xMin+(xMax-xMin)*i/199);
  const ys=xs.map(fn);
  const yMin=Math.min(...ys)-1, yMax=Math.max(...ys)+1;
  const {px,py}=drawAxes(cv.getContext('2d'),W,H,xMin,xMax,yMin,yMax);
  plotFunc(ctx,fn,xMin,xMax,px,py,'#185FA5');
  return cv;
}

// Draw f and f' both
function drawFandFprime(a,b,c){
  const W=560,H=240;
  const cv=makeCanvas(W,H);
  const ctx=cv.getContext('2d');
  ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);
  const xMin=-8,xMax=12;
  const fn=x=>a*x*x*x+b*x*x+c*x;
  const fp=x=>3*a*x*x+2*b*x+c;
  const xs=Array.from({length:200},(_,i)=>xMin+(xMax-xMin)*i/199);
  const allY=[...xs.map(fn),...xs.map(fp)];
  const yMin=Math.min(...allY)*1.1, yMax=Math.max(...allY)*1.1;
  const {px,py}=drawAxes(ctx,W,H,xMin,xMax,yMin,yMax);
  plotFunc(ctx,fn,xMin,xMax,px,py,'#185FA5');
  plotFunc(ctx,fp,xMin,xMax,px,py,'#C0392B');
  // legend
  ctx.font='12px system-ui';
  ctx.fillStyle='#185FA5';ctx.fillRect(W-110,10,14,3);ctx.fillText('f(x)',W-92,14);
  ctx.fillStyle='#C0392B';ctx.fillRect(W-110,24,14,3);ctx.fillText("f'(x)",W-92,28);
  return cv;
}

// Draw binomial distribution bar chart
function drawBinom(n,p){
  const W=560,H=200;
  const cv=makeCanvas(W,H);
  const ctx=cv.getContext('2d');
  ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);
  function C(n,k){return fak(n)/(fak(k)*fak(n-k));}
  const probs=Array.from({length:n+1},(_,k)=>C(n,k)*Math.pow(p,k)*Math.pow(1-p,n-k));
  const maxP=Math.max(...probs);
  const pad={l:40,r:10,t:15,b:30};
  const iW=W-pad.l-pad.r,iH=H-pad.t-pad.b;
  const bw=iW/(n+1)*0.7, gap=iW/(n+1);
  // y axis
  ctx.strokeStyle='#aaa';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(pad.l,pad.t);ctx.lineTo(pad.l,pad.t+iH);ctx.lineTo(pad.l+iW,pad.t+iH);ctx.stroke();
  // bars
  probs.forEach((p2,k)=>{
    const bh=(p2/maxP)*iH;
    const bx=pad.l+k*gap+(gap-bw)/2;
    const by=pad.t+iH-bh;
    ctx.fillStyle='#B5D4F4';ctx.strokeStyle='#185FA5';ctx.lineWidth=0.5;
    ctx.fillRect(bx,by,bw,bh);ctx.strokeRect(bx,by,bw,bh);
    ctx.fillStyle='#444';ctx.font='10px system-ui';ctx.textAlign='center';
    ctx.fillText(k,bx+bw/2,pad.t+iH+14);
  });
  // y labels
  ctx.fillStyle='#888';ctx.font='10px system-ui';ctx.textAlign='right';
  for(let i=0;i<=4;i++){
    const v=maxP*i/4;
    const yp=pad.t+iH-(v/maxP)*iH;
    ctx.fillText(v.toFixed(2),pad.l-4,yp+3);
  }
  ctx.fillStyle='#555';ctx.font='11px system-ui';ctx.textAlign='center';
  ctx.fillText('Antal succeser',pad.l+iW/2,H-2);
  return cv;
}

// Draw pindediagram
function drawPinde(vals,freqs){
  const W=560,H=200;
  const cv=makeCanvas(W,H);
  const ctx=cv.getContext('2d');
  ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);
  const maxF=Math.max(...freqs);
  const pad={l:40,r:10,t:15,b:30};
  const iW=W-pad.l-pad.r,iH=H-pad.t-pad.b;
  const n=vals.length, bw=iW/n*0.15, gap=iW/n;
  ctx.strokeStyle='#aaa';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(pad.l,pad.t);ctx.lineTo(pad.l,pad.t+iH);ctx.lineTo(pad.l+iW,pad.t+iH);ctx.stroke();
  vals.forEach((v,i)=>{
    const bh=(freqs[i]/maxF)*iH;
    const bx=pad.l+i*gap+gap/2;
    ctx.strokeStyle='#185FA5';ctx.lineWidth=2.5;
    ctx.beginPath();ctx.moveTo(bx,pad.t+iH);ctx.lineTo(bx,pad.t+iH-bh);ctx.stroke();
    ctx.fillStyle='#185FA5';ctx.beginPath();ctx.arc(bx,pad.t+iH-bh,3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#444';ctx.font='11px system-ui';ctx.textAlign='center';
    ctx.fillText(v,bx,pad.t+iH+14);
  });
  for(let i=0;i<=4;i++){
    const v=maxF*i/4;
    const yp=pad.t+iH-(v/maxF)*iH;
    ctx.fillStyle='#888';ctx.font='10px system-ui';ctx.textAlign='right';
    ctx.fillText(Math.round(v),pad.l-4,yp+3);
  }
  return cv;
}

// --- QUESTION GENERATORS ---
const GENERATORS={
  F1:[
    ()=>{const a=rnd(-5,5)||1,b=rnd(-10,10);return{type:"input",text:`En lineær funktion har forskriften f(x) = ${a}x ${b>=0?'+ '+b:'− '+Math.abs(b)}. Hvad er hældningskoefficienten?`,answer:String(a),accept:[String(a)],explanation:`Hældningskoefficienten er a = ${a}.`};},
    ()=>{const a=rnd(-5,5)||1,b=rnd(-10,10);return{type:"input",text:`Hvad er skæringen med y-aksen for f(x) = ${a}x ${b>=0?'+ '+b:'− '+Math.abs(b)}?`,answer:String(b),accept:[String(b)],explanation:`b-værdien er ${b}. Det er f(0).`};},
    ()=>{const a=rnd(1,5),b=rnd(-20,20);const np=-b/a;if(!Number.isInteger(np))return GENERATORS.F1[2]();return{type:"input",text:`Bestem nulpunktet for f(x) = ${a}x ${b>=0?'+ '+b:'− '+Math.abs(b)}.`,answer:String(np),accept:[String(np),"x="+np],explanation:`${a}x ${b>=0?'+ '+b:'− '+Math.abs(b)} = 0 → x = ${np}`};},
    ()=>{const a=rnd(-5,5)||1,b=rnd(-10,10),x=rnd(-5,5);const fx=a*x+b;return{type:"input",text:`Bestem f(${x}), når f(x) = ${a}x ${b>=0?'+ '+b:'− '+Math.abs(b)}.`,answer:String(fx),accept:[String(fx)],explanation:`f(${x}) = ${a}·${x} ${b>=0?'+ '+b:'− '+Math.abs(b)} = ${fx}`};},
    ()=>{const a=rnd(-4,4)||1,b=rnd(-8,8);const x1=rnd(0,3),y1=a*x1+b,x2=x1+rnd(1,4),y2=a*x2+b;return{type:"input",text:`En lineær funktion går gennem (${x1}, ${y1}) og (${x2}, ${y2}). Hvad er hældningskoefficienten?`,answer:String(a),accept:[String(a)],explanation:`a = (${y2}−${y1})/(${x2}−${x1}) = ${y2-y1}/${x2-x1} = ${a}`};},
    ()=>{const s=rnd(20,60),p=rnd(8,20),k=rnd(3,15),t=s+p*k;return{type:"input",text:`En taxa koster ${s} kr i startgebyr og ${p} kr/km. Hvad koster en tur på ${k} km?`,answer:String(t),accept:[String(t),t+" kr"],explanation:`${s} + ${p}·${k} = ${s} + ${p*k} = ${t} kr`};},
    ()=>{const a=rnd(1,5),b=rnd(-10,10);return{type:"mc",text:`Hvad er den omvendte funktion til f(x) = ${a}x ${b>=0?'+ '+b:'− '+Math.abs(b)}?`,options:[`f⁻¹(x) = (x${b>=0?' − '+b:' + '+Math.abs(b)}) / ${a}`,`f⁻¹(x) = ${a}x ${b>=0?'− '+b:'+ '+Math.abs(b)}`,`f⁻¹(x) = x / ${a} ${b>=0?'+ '+b:'− '+Math.abs(b)}`,`f⁻¹(x) = (x${b>=0?' + '+b:' − '+Math.abs(b)}) / ${a}`],correct:0,explanation:`Byt om: x = ${a}·y ${b>=0?'+ '+b:'− '+Math.abs(b)} → y = (x${b>=0?' − '+b:' + '+Math.abs(b)}) / ${a}`};},
    ()=>{const a=rnd(-4,4)||1,b=rnd(-5,5);return{type:"mc",text:`Er f(x) = ${a}x ${b>=0?'+ '+b:'− '+Math.abs(b)} voksende eller aftagende?`,options:["Voksende","Aftagende"],correct:a>0?0:1,explanation:`a = ${a} er ${a>0?"positiv → voksende":"negativ → aftagende"}.`};},
    ()=>{const a=rnd(-3,3)||1,b=rnd(-6,6),c=rnd(-6,6);return{type:"input",text:`Reducér: ${a===1?'':a}(${Math.abs(b)}x ${c>=0?'+ '+c:'− '+Math.abs(c)}) ${a*b>=0?'+ ':'− '}${Math.abs(a*c)}.`,answer:fmt(a*b)+"x",accept:[fmt(a*b)+"x",String(a*b)+"x"],explanation:`${a}·${b}x ${a>=0?'+ ':' '}${a}·${c} ${a*b>=0?'+ ':'− '}${Math.abs(a*c)} = ${a*b}x + ${a*c+a*c}`};},

let selected="F1",sessionQs=[],qIndex=0,correct=0,wrong=0,maxCount=5,answered=false;

function init(){
  const grid=document.getElementById("forloeb-grid");
  Object.entries(FORLOEB).forEach(([key,name])=>{
    const btn=document.createElement("button");
    btn.className="f-btn"+(key===selected?" active":"");
    btn.innerHTML=`<span style="font-size:11px;color:#666">${key}</span><br>${name}`;
    btn.onclick=()=>selectForloeb(key,btn);
    grid.appendChild(btn);
  });
}
function selectForloeb(key,btn){selected=key;document.querySelectorAll(".f-btn").forEach(b=>b.classList.remove("active"));btn.classList.add("active");}
function setCount(n,btn){maxCount=n;document.querySelectorAll("#count-btns .f-btn").forEach(b=>b.classList.remove("active"));btn.classList.add("active");}
function show(id){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));document.getElementById(id).classList.add("active");}
function goHome(){show("screen-select");}

function generateQuestions(){
  const gens=shuffle([...GENERATORS[selected]]);
  const result=[];
  let attempts=0;
  while(result.length<maxCount&&attempts<maxCount*6){
    attempts++;
    const gen=gens[result.length%gens.length];
    try{const q=gen();if(q)result.push(q);}catch(e){}
  }
  return result;
}

function startQuiz(){
  sessionQs=generateQuestions();
  qIndex=0;correct=0;wrong=0;
  show("screen-quiz");renderQuestion();
}

function renderQuestion(){
  answered=false;
  const q=sessionQs[qIndex];
  document.getElementById("progress-fill").style.width=Math.round(qIndex/sessionQs.length*100)+"%";
  document.getElementById("q-counter").textContent=(qIndex+1)+" / "+sessionQs.length;
  document.getElementById("q-forloeb").textContent=FORLOEB[selected];
  document.getElementById("q-type-label").textContent=q.type==="mc"?"Vælg det rigtige svar":"Skriv dit svar";
  document.getElementById("q-text").textContent=q.text;
  document.getElementById("feedback").className="feedback";
  document.getElementById("next-btn").style.display="none";

  const extra=document.getElementById("q-extra");
  extra.innerHTML="";
  if(q.graph){
    const wrap=document.createElement("div");wrap.className="graph-wrap";
    wrap.appendChild(q.graph);extra.appendChild(wrap);
  }

  const mcDiv=document.getElementById("mc-options");
  const inputDiv=document.getElementById("input-area");
  if(q.type==="mc"){
    inputDiv.style.display="none";mcDiv.innerHTML="";
    q.options.forEach((opt,i)=>{
      const btn=document.createElement("button");btn.className="mc-option";btn.textContent=opt;
      btn.onclick=()=>checkMC(i,btn,q);mcDiv.appendChild(btn);
    });
  } else {
    mcDiv.innerHTML="";inputDiv.style.display="block";
    const inp=document.getElementById("answer-input");inp.value="";inp.disabled=false;
    setTimeout(()=>inp.focus(),50);
  }
}

function checkMC(chosen,btn,q){
  if(answered)return;answered=true;
  document.querySelectorAll(".mc-option").forEach(b=>{b.onclick=null;b.classList.add("disabled");});
  if(chosen===q.correct){btn.classList.remove("disabled");btn.classList.add("correct");showFeedback(true,q.explanation);correct++;}
  else{btn.classList.remove("disabled");btn.classList.add("wrong");document.querySelectorAll(".mc-option")[q.correct].classList.remove("disabled");document.querySelectorAll(".mc-option")[q.correct].classList.add("show-correct");showFeedback(false,"Forkert. "+q.explanation);wrong++;}
  document.getElementById("next-btn").style.display="block";
}

function checkInput(){
  if(answered)return;
  const q=sessionQs[qIndex];
  const raw=document.getElementById("answer-input").value.trim();
  const val=raw.replace(",",".");
  const accepts=q.accept.map(a=>a.replace(",",".").toLowerCase().trim());
  const ok=accepts.includes(val.toLowerCase());
  answered=true;document.getElementById("answer-input").disabled=true;
  if(ok){showFeedback(true,q.explanation);correct++;}
  else{showFeedback(false,"Forkert — svaret er: "+q.answer+". "+q.explanation);wrong++;}
  document.getElementById("next-btn").style.display="block";
}

function showFeedback(ok,msg){
  const fb=document.getElementById("feedback");fb.className="feedback "+(ok?"correct":"wrong");fb.textContent=(ok?"Rigtigt! ":"")+msg;
}

function nextQuestion(){qIndex++;if(qIndex>=sessionQs.length)showResult();else renderQuestion();}

function showResult(){
  const tot=correct+wrong;
  document.getElementById("res-correct").textContent=correct;
  document.getElementById("res-wrong").textContent=wrong;
  document.getElementById("res-pct").textContent=Math.round(correct/tot*100)+"%";
  show("screen-result");
}

init();
</script>
</body>
</html>
