<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mindstekrav вҖ” MatematiktrГҰner</title>
<script src="https://cdn.jsdelivr.net/npm/plotly.js-dist@2.27.0/plotly.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;padding:1.5rem;background:#f5f5f0;min-height:100vh;max-width:700px;margin:0 auto}
.screen{display:none}.screen.active{display:block}
.card{background:#fff;border:1px solid #e0e0d8;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.forloeb-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:10px;margin-top:1rem}
.f-btn{background:#fff;border:1px solid #ccc;border-radius:8px;padding:0.75rem 1rem;cursor:pointer;font-size:13px;font-weight:500;color:#222;text-align:left;transition:background 0.15s;line-height:1.5}
.f-btn:hover{background:#f0f0ec}
.f-btn.active{border:2px solid #185FA5;background:#E6F1FB;color:#0C447C}
.q-label{font-size:11px;color:#888;margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px}
.q-text{font-size:15px;color:#111;line-height:1.75;margin-bottom:1.25rem}
.mc-option{display:block;width:100%;text-align:left;background:#fff;border:1px solid #ddd;border-radius:8px;padding:0.65rem 1rem;margin-bottom:8px;cursor:pointer;font-size:14px;color:#222;transition:all 0.1s}
.mc-option:hover{background:#f5f5f0;border-color:#aaa}
.mc-option.correct{background:#EAF3DE;border:2px solid #3B6D11;color:#27500A;pointer-events:none}
.mc-option.wrong{background:#FCEBEB;border:2px solid #A32D2D;color:#791F1F;pointer-events:none}
.mc-option.show-correct{background:#EAF3DE;border:2px solid #3B6D11;color:#27500A;pointer-events:none}
.mc-option.disabled{pointer-events:none;opacity:0.5}
.input-row{display:flex;gap:8px;align-items:center;margin-bottom:1rem}
.input-row input{flex:1;padding:0.55rem 0.75rem;border:1px solid #ccc;border-radius:8px;font-size:15px;background:#fff;color:#111}
.input-row input:disabled{background:#f5f5f0;color:#888}
.feedback{border-radius:8px;padding:0.75rem 1rem;font-size:14px;margin-bottom:1rem;display:none;line-height:1.6}
.feedback.correct{background:#EAF3DE;color:#27500A;display:block}
.feedback.wrong{background:#FCEBEB;color:#791F1F;display:block}
.score-row{display:flex;gap:12px;margin-bottom:1rem}
.score-box{background:#f5f5f0;border-radius:8px;padding:0.75rem 1rem;flex:1;text-align:center}
.score-box .num{font-size:26px;font-weight:500;color:#111}
.score-box .lbl{font-size:12px;color:#666;margin-top:2px}
button.primary{background:#fff;border:1px solid #ccc;border-radius:8px;padding:0.6rem 1.2rem;font-size:14px;cursor:pointer;color:#222;transition:background 0.15s}
button.primary:hover{background:#f0f0ec}
.progress-bar{height:4px;background:#e8e8e2;border-radius:2px;margin-bottom:1.25rem}
.progress-fill{height:4px;background:#185FA5;border-radius:2px;transition:width 0.3s}
.plot-wrap{margin:0.75rem 0;border:1px solid #e0e0d8;border-radius:8px;overflow:hidden;background:#fff}
h1{font-size:18px;font-weight:600;color:#111;margin-bottom:4px}
.sub{font-size:14px;color:#666;margin-bottom:1rem}
</style>
</head>
<body>

<div id="screen-select" class="screen active">
  <div class="card">
    <h1>Mindstekrav вҖ” matematiktrГҰner</h1>
    <p class="sub">VГҰlg et forlГёb. Opgaverne genereres med tilfГҰldige tal og interaktive grafer.</p>
    <div class="forloeb-grid" id="forloeb-grid"></div>
  </div>
  <div class="card">
    <p style="font-size:13px;color:#666;margin-bottom:8px">Antal opgaver per session</p>
    <div style="display:flex;gap:8px;flex-wrap:wrap" id="count-btns">
      <button class="f-btn active" onclick="setCount(5,this)">5</button>
      <button class="f-btn" onclick="setCount(10,this)">10</button>
      <button class="f-btn" onclick="setCount(15,this)">15</button>
      <button class="f-btn" onclick="setCount(999,this)">Alle</button>
    </div>
  </div>
  <button class="primary" onclick="startQuiz()" style="width:100%;padding:0.8rem;font-size:15px">Start trГҰning</button>
  <button class="primary" onclick="startAllForloeb()" style="width:100%;padding:0.8rem;font-size:15px;margin-top:8px;border-color:#185FA5;color:#185FA5">GennemgГҘ alle forlГёb (overblik)</button>
</div>

<div id="screen-quiz" class="screen">
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <span class="q-label" id="q-forloeb"></span>
      <span style="font-size:12px;color:#888" id="q-counter"></span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <p class="q-label" id="q-type-label"></p>
    <div id="q-graph"></div>
    <p class="q-text" id="q-text"></p>
    <div id="mc-options"></div>
    <div id="input-area" style="display:none">
      <div class="input-row">
        <input type="text" id="answer-input" placeholder="Skriv dit svar..." onkeydown="if(event.key==='Enter')checkInput()">
        <button class="primary" onclick="checkInput()">Tjek</button>
      </div>
    </div>
    <div class="feedback" id="feedback"></div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="primary" id="next-btn" onclick="nextQuestion()" style="display:none;flex:1">NГҰste opgave</button>
      <button class="primary" onclick="goHome()" style="font-size:13px;color:#999">Afslut</button>
    </div>
  </div>
</div>

<div id="screen-result" class="screen">
  <div class="card">
    <h1 style="margin-bottom:1rem">Resultat</h1>
    <div class="score-row">
      <div class="score-box"><div class="num" id="res-correct">0</div><div class="lbl">Rigtige</div></div>
      <div class="score-box"><div class="num" id="res-wrong">0</div><div class="lbl">Forkerte</div></div>
      <div class="score-box"><div class="num" id="res-pct">0%</div><div class="lbl">Score</div></div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="primary" onclick="startQuiz()" style="flex:1">PrГёv igen</button>
      <button class="primary" onclick="goHome()" style="flex:1">VГҰlg forlГёb</button>
    </div>
  </div>
</div>

<script>
const FORLOEB={F0:"GrundlГҰggende fГҰrdigheder",F1:"LineГҰre funktioner",F2:"Eksponentielle funktioner",F3:"Andengradsfunktioner",F4:"Differentialregning",F5:"Finansiel regning",F6:"Beskrivende statistik",F7:"Sandsynlighedsregning",F8:"Hypotesetest og konfidensintervaller"};

function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function rndF(a,b,d){return parseFloat((Math.random()*(b-a)+a).toFixed(d));}
function shuffle(a){let r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}
function fmt(n){return String(n).replace('.',',');}
function fak(n){return n<=1?1:n*fak(n-1);}
function linspace(a,b,n){return Array.from({length:n},(_,i)=>a+(b-a)*i/(n-1));}

const PLOTLY_CONFIG={responsive:true,displayModeBar:false};
const PLOTLY_LAYOUT_BASE={
  margin:{l:50,r:20,t:20,b:50},
  plot_bgcolor:'#fafaf8',
  paper_bgcolor:'#fff',
  font:{family:'system-ui',size:12,color:'#555'},
  xaxis:{gridcolor:'#e8e8e2',zerolinecolor:'#aaa',zerolinewidth:1.5},
  yaxis:{gridcolor:'#e8e8e2',zerolinecolor:'#aaa',zerolinewidth:1.5},
  showlegend:false,
  height:280
};

function makePlotSpec(traces, layout){
  return {traces, layout};
}

function plotLines(traces, xrange, yrange){
  const layout=Object.assign({},PLOTLY_LAYOUT_BASE,{
    xaxis:Object.assign({},PLOTLY_LAYOUT_BASE.xaxis,{range:xrange}),
    yaxis:Object.assign({},PLOTLY_LAYOUT_BASE.yaxis,{range:yrange})
  });
  return makePlotSpec(traces, layout);
}

function renderGraph(spec){
  const wrap=document.createElement('div');
  wrap.className='plot-wrap';
  const id='plot_'+Date.now()+'_'+Math.floor(Math.random()*10000);
  const div=document.createElement('div');
  div.id=id;
  wrap.appendChild(div);
  setTimeout(()=>{
    if(document.getElementById(id)){
      Plotly.newPlot(id, spec.traces, spec.layout, PLOTLY_CONFIG);
    }
  }, 200);
  return wrap;
}

function makeFuncTrace(fn,xMin,xMax,color,name,dash){
  const xs=linspace(xMin,xMax,400);
  return{x:xs,y:xs.map(fn),mode:'lines',line:{color:color||'#185FA5',width:2.5,dash:dash||'solid'},name:name||''};
}

function makeBarTrace(xs,ys,color){
  return{x:xs,y:ys,type:'bar',marker:{color:color||'#B5D4F4',line:{color:'#185FA5',width:1}},width:0.5};
}

function makeScatterTrace(xs,ys,color,size){
  return{x:xs,y:ys,mode:'markers',marker:{color:color||'#C0392B',size:size||8}};
}

// ---- QUESTION GENERATORS ----
const GENERATORS={
  F0:[
    // LГёs ligning xВІ + k = c
    ()=>{const k=rnd(1,10),c=rnd(k+1,k+20),x=Math.round(Math.sqrt(c-k));if(x*x!==c-k)return GENERATORS.F0[0]();return{type:"input",text:`LГёs ligningen xВІ ${k>0?'+ '+k:'вҲ’ '+Math.abs(k)} = ${c}.`,answer:String(x),accept:[String(x),String(-x),"x="+x,"Вұ"+x],explanation:`xВІ = ${c-k} вҶ’ x = ВұвҲҡ${c-k} = Вұ${x}`};},
    // ReducГ©r udtryk med parenteser
    ()=>{const a=rnd(2,5),bx=rnd(1,6),by=rnd(1,6),c=rnd(2,5),dx=rnd(1,6),dy=rnd(1,6);const rx=a*bx-c*dx,ry=a*by-c*dy;const rxStr=rx===0?"":rx>0?`${rx}x`:`${rx}x`,ryStr=ry===0?"":ry>0?`+ ${ry}y`:`вҲ’ ${Math.abs(ry)}y`;const ans=rx===0?`${ry}y`:ry===0?`${rx}x`:`${rx}x ${ry>=0?'+ '+ry:'вҲ’ '+Math.abs(ry)}y`;return{type:"input",text:`ReducГ©r: ${a}(${bx}x + ${by}y) вҲ’ ${c}(${dx}x + ${dy}y)`,answer:ans,accept:[ans,ans.replace(' ','')],explanation:`= ${a*bx}x + ${a*by}y вҲ’ ${c*dx}x вҲ’ ${c*dy}y = ${ans}`};},
    // LГёs eksponentiel ligning aВ·bЛЈ = c
    ()=>{const base=rnd(2,5),exp=rnd(2,4),bv=rnd(1,4),rhs=bv*Math.pow(base,exp);return{type:"input",text:`LГёs ligningen ${bv} В· ${base}ЛЈ = ${rhs}.`,answer:String(exp),accept:[String(exp),"x="+exp,"x = "+exp],explanation:`${bv} В· ${base}ЛЈ = ${rhs} вҶ’ ${base}ЛЈ = ${rhs/bv} = ${base}^${exp} вҶ’ x = ${exp}`};},
    // Potensregneregler
    ()=>{const a=rnd(2,6),m=rnd(2,5),n=rnd(2,4);const ans=m+n;return{type:"input",text:`Beregn: ${a}^${m} В· ${a}^${n} = ${a}^?`,answer:String(ans),accept:[String(ans)],explanation:`${a}^${m} В· ${a}^${n} = ${a}^(${m}+${n}) = ${a}^${ans}`};},
    // ReducГ©r med kvadrat pГҘ toleddet
    ()=>{const a=rnd(1,5),b=rnd(1,5);const r1=a*a,r2=2*a*b,r3=b*b;return{type:"input",text:`Hvad er (${a}x + ${b})ВІ? Skriv koefficienten foran xВІ.`,answer:String(r1),accept:[String(r1)],explanation:`(${a}x + ${b})ВІ = ${r1}xВІ + ${r2}x + ${r3}. Koefficienten foran xВІ er ${r1}.`};},
    // BrГёk med fakultet
    ()=>{function fak(n){return n<=1?1:n*fak(n-1);}const n=rnd(4,7),k=rnd(1,3);const ans=Array.from({length:k},(_,i)=>n-i).reduce((a,b)=>a*b,1);return{type:"input",text:`Beregn ${n}! / ${n-k}!`,answer:String(ans),accept:[String(ans)],explanation:`${n}!/${(n-k)}! = ${Array.from({length:k},(_,i)=>n-i).join(' В· ')} = ${ans}`};},
  ],
  F1:[
    // 1. Bestem forskriften gennem to punkter
    ()=>{
      const a=rnd(-4,4)||1, b=rnd(-8,8);
      const x1=rnd(0,4), y1=a*x1+b, x2=x1+rnd(1,4), y2=a*x2+b;
      return{type:"input",
        text:`Bestem forskriften for den lineГҰre funktion, hvis graf gГҘr gennem punkterne (xвӮҒ, yвӮҒ) = (${x1}, ${y1}) og (xвӮӮ, yвӮӮ) = (${x2}, ${y2}).`,
        answer:`f(x) = ${a}x ${b>=0?'+ '+b:'вҲ’ '+Math.abs(b)}`,
        accept:[`${a}x${b>=0?'+'+b:''+b}`,`${a}x ${b>=0?'+ '+b:'вҲ’ '+Math.abs(b)}`,String(b)+"_hГҰldning_"+String(a)],
        explanation:`a = (${y2}вҲ’${y1})/(${x2}вҲ’${x1}) = ${a}. b = ${y1}вҲ’${a}В·${x1} = ${b}. Forskrift: f(x) = ${a}x ${b>=0?'+ '+b:'вҲ’ '+Math.abs(b)}.`
      };
    },
    // 2. Tegn graf + forklar a og b (MC)
    ()=>{
      const a=rnd(-4,4)||1, b=rnd(-8,8);
      const fn=x=>a*x+b;
      const t1=makeFuncTrace(fn,-5,5,'#185FA5');
      const tP=makeScatterTrace([0],[b],'#C0392B',9);
      const graph=plotLines([t1,tP],[-5,5],[Math.min(fn(-5),fn(5))-2,Math.max(fn(-5),fn(5))+2]);
      return{type:"mc",
        text:`Grafen viser f(x) = ${a}x ${b>=0?'+ '+b:'вҲ’ '+Math.abs(b)}. Hvad er den rГёde prikkes betydning?`,
        graph,
        options:[`Det er skГҰringspunktet med y-aksen: (0, ${b})`,`Det er nulpunktet`,`Det er toppunktet`,`Det er hГҰldningskoefficienten`],
        correct:0,
        explanation:`Den rГёde prik er (0, ${b}) вҖ” skГҰringen med y-aksen, svarende til b = ${b}. HГҰldningen er a = ${a}.`
      };
    },
    // 3. Bestem nulpunkt
    ()=>{
      const a=rnd(1,5), b=rnd(-20,20);
      const np=-b/a;
      if(!Number.isInteger(np)) return GENERATORS.F1[2]();
      return{type:"input",
        text:`En funktion er givet ved f(x) = ${a}x ${b>=0?'+ '+b:'вҲ’ '+Math.abs(b)}. Bestem nulpunktet.`,
        answer:String(np),
        accept:[String(np),"x="+np,"x = "+np],
        explanation:`SГҰt f(x) = 0: ${a}x ${b>=0?'+ '+b:'вҲ’ '+Math.abs(b)} = 0 вҶ’ x = ${np}`
      };
    },
    // 4. AflГҰs definitionsmГҰngde og vГҰrdimГҰngde fra begrГҰnset funktion
    ()=>{
      const a=rnd(-3,3)||1, b=rnd(-5,5);
      const x1=rnd(-2,1), x2=x1+rnd(3,6);
      const y1=a*x1+b, y2=a*x2+b;
      const yMin=Math.min(y1,y2), yMax=Math.max(y1,y2);
      const xMin2=Math.min(x1,x2), xMax2=Math.max(x1,x2);
      const fn=x=>a*x+b;
      const t1={x:[x1,x2],y:[y1,y2],mode:'lines',line:{color:'#185FA5',width:2.5}};
      const tStart=makeScatterTrace([x1],[y1],'#185FA5',10);
      const tEnd={x:[x2],y:[y2],mode:'markers',marker:{color:'#185FA5',size:10,symbol:'circle-open',line:{width:2,color:'#185FA5'}}};
      const graph=plotLines([t1,tStart,tEnd],[x1-2,x2+2],[yMin-2,yMax+2]);
      const dm=`[${x1}; ${x2}]`, vm=a>0?`[${y1}; ${y2}]`:`[${y2}; ${y1}]`;
      return{type:"mc",
        text:`Grafen viser en begrГҰnset lineГҰr funktion. Hvad er definitionsmГҰngden?`,
        graph,
        options:[dm, `[${y1}; ${y2}]`, `]${x1}; ${x2}[`, `[${x1-1}; ${x2+1}]`],
        correct:0,
        explanation:`DefinitionsmГҰngden aflГҰses pГҘ x-aksen: Dm = ${dm}. VГҰrdimГҰngden er Vm = ${vm}.`
      };
    },
    // 5. Taxa - opskriv funktionsforskrift
    ()=>{
      const s=rnd(20,60), p=rnd(8,20), k=rnd(3,15), t=s+p*k;
      return{type:"input",
        text:`En taxa koster ${s} kr i startgebyr og ${p} kr/km. Opskriv en funktionsforskrift f(x) for den samlede pris. Hvad er f(${k})?`,
        answer:String(t),
        accept:[String(t), t+" kr"],
        explanation:`f(x) = ${p}x + ${s}. f(${k}) = ${p}В·${k} + ${s} = ${p*k} + ${s} = ${t} kr.`
      };
    },
    // 6. HГҰldningskoefficient
    ()=>{const a=rnd(-5,5)||1,b=rnd(-10,10);return{type:"input",text:`f(x) = ${a}x ${b>=0?'+ '+b:'вҲ’ '+Math.abs(b)}. Hvad er hГҰldningskoefficienten?`,answer:String(a),accept:[String(a)],explanation:`HГҰldningskoefficienten er a = ${a}.`};},
    // 7. Omvendt funktion
    ()=>{const a=rnd(1,5),b=rnd(-10,10);return{type:"mc",text:`Hvad er den omvendte funktion til f(x) = ${a}x ${b>=0?'+ '+b:'вҲ’ '+Math.abs(b)}?`,options:[`fвҒ»В№(x) = (x${b>=0?' вҲ’ '+b:' + '+Math.abs(b)}) / ${a}`,`fвҒ»В№(x) = ${a}x ${b>=0?'вҲ’ '+b:'+ '+Math.abs(b)}`,`fвҒ»В№(x) = x / ${a}`,`fвҒ»В№(x) = (x${b>=0?' + '+b:' вҲ’ '+Math.abs(b)}) / ${a}`],correct:0,explanation:`Byt om: x = ${a}y ${b>=0?'+ '+b:'вҲ’ '+Math.abs(b)} вҶ’ y = (x${b>=0?' вҲ’ '+b:' + '+Math.abs(b)}) / ${a}`};},
    // 8. Voksende/aftagende
    ()=>{const a=rnd(-4,4)||1,b=rnd(-5,5);return{type:"mc",text:`Er f(x) = ${a}x ${b>=0?'+ '+b:'вҲ’ '+Math.abs(b)} voksende eller aftagende?`,options:["Voksende","Aftagende"],correct:a>0?0:1,explanation:`a = ${a} er ${a>0?"positiv вҶ’ voksende":"negativ вҶ’ aftagende"}.`};},
  ],
  F2:[
    // 1. BegyndelsesvГҰrdi og vГҰkstrate fra forskrift
    ()=>{
      const b=rnd(2,100), r=rnd(2,25), a=parseFloat((1+r/100).toFixed(2));
      return{type:"input",
        text:`En eksponentiel funktion har forskriften f(x) = ${b} В· ${fmt(a)}ЛЈ. Hvad er funktionens begyndelsesvГҰrdi og vГҰkstrate? Skriv vГҰkstraten i %.`,
        answer:String(r),
        accept:[String(r), r+"%", r+" %"],
        explanation:`BegyndelsesvГҰrdi = ${b} (f(0) = ${b}В·1 = ${b}). VГҰkstrate: a = ${fmt(a)} = 1 + r/100 вҶ’ r = ${r}%.`
      };
    },
    // 2. Identificer forskrift fra graf (3 valgmuligheder)
    ()=>{
      const rising=Math.random()>0.5, a=rising?rndF(1.2,1.8,2):rndF(0.4,0.8,2), b=rnd(2,6);
      const a2=rising?rndF(0.4,0.8,2):rndF(1.2,1.8,2), b2=rnd(2,6);
      const a3=rndF(1.02,1.1,2), b3=rnd(8,15);
      const which=0;
      const fn=x=>b*Math.pow(a,x);
      const xMax=6;
      const yMax=Math.max(fn(0),fn(xMax))*1.2, yMin=0;
      const t1=makeFuncTrace(fn,-2,xMax,'#185FA5');
      const graph=plotLines([t1],[-2,xMax],[yMin,yMax]);
      const opts=[`f(x) = ${b} В· ${fmt(a)}ЛЈ`,`g(x) = ${b2} В· ${fmt(a2)}ЛЈ`,`h(x) = ${b3} В· ${fmt(a3)}ЛЈ`];
      return{type:"mc",
        text:`Bestem hvilken af de tre fГёlgende forskrifter, der svarer til grafen.`,
        graph,
        options:opts,
        correct:0,
        explanation:`BegyndelsesvГҰrdien er ${b} (aflГҰs y-aksen ved x=0) og funktionen er ${a>1?"voksende":"aftagende"} med a = ${fmt(a)}.`
      };
    },
    // 3. AflГҰs fordoblingskonstant fra graf
    ()=>{
      const a=rndF(1.2,1.8,2), b=rnd(1,4);
      const T=Math.round(Math.log(2)/Math.log(a)*10)/10;
      const xMax=Math.ceil(T*3.5);
      const fn=x=>b*Math.pow(a,x);
      const t1=makeFuncTrace(fn,0,xMax,'#185FA5');
      const tMark=makeScatterTrace([T],[fn(T)],'#C0392B',10);
      const graph=plotLines([t1,tMark],[0,xMax],[0,fn(xMax)*1.1]);
      return{type:"input",
        text:`Grafen for en voksende eksponentiel funktion er tegnet nedenfor. AflГҰs fordoblingskonstanten TвӮӮ. (1 decimal)`,
        graph,
        answer:fmt(T),
        accept:[fmt(T),String(T)],

    ()=>{const total=rnd(20,50),hyp=rnd(3,total-3),freq=Math.round(hyp/total*100)/100;return{type:"input",text:`${hyp} ud af ${total} observationer. Relativ frekvens? (2 dec)`,answer:fmt(freq),accept:[fmt(freq),String(freq)],explanation:`${hyp}/${total} = ${fmt(freq)}`};},
  ],
  F7:[
    ()=>{const total=rnd(4,10),fav=rnd(1,total-1),p=Math.round(fav/total*100)/100;return{type:"input",text:`Pose med ${total} kugler, ${fav} rГёde. P(rГёd)? (2 dec)`,answer:fmt(p),accept:[fmt(p),String(p),fav+"/"+total],explanation:`P(rГёd) = ${fav}/${total} = ${fmt(p)}`};},
    ()=>{const n=rnd(5,20),p=rnd(1,9)/10,mu=Math.round(n*p*10)/10;return{type:"input",text:`X ~ b(n=${n}, p=${fmt(p)}). MiddelvГҰrdi Ој?`,answer:fmt(mu),accept:[fmt(mu),String(mu)],explanation:`Ој = nВ·p = ${n}В·${fmt(p)} = ${fmt(mu)}`};},
    ()=>{
      const n=rnd(8,15),p=rnd(1,4)/10;
      function C(n,k){return fak(n)/(fak(k)*fak(n-k));}
      const ks=Array.from({length:n+1},(_,k)=>k);
      const probs=ks.map(k=>Math.round(C(n,k)*Math.pow(p,k)*Math.pow(1-p,n-k)*1000)/1000);
      const k=rnd(0,3);const pk=probs[k];
      const t=makeBarTrace(ks,probs,'#B5D4F4');
      const tMark={x:[k],y:[probs[k]],type:'bar',marker:{color:'#C0392B'},width:0.5};
      const graph=plotLines([t,tMark],[-0.5,n+0.5],[0,Math.max(...probs)*1.2]);
      return{type:"input",text:`Binomialfordeling n=${n}, p=${fmt(p)}. Hvad er P(X=${k})? (aflГҰs den rГёde sГёjle, 2 dec)`,graph,answer:fmt(pk),accept:[fmt(pk),String(pk),fmt(Math.round(pk*10)/10)],explanation:`P(X=${k}) вүҲ ${fmt(pk)}`};
    },
    ()=>{const r=rnd(1,5),b=rnd(1,5),tot=r+b,pR=Math.round(r/tot*100)/100;return{type:"mc",text:`Pose med ${r} rГёde og ${b} blГҘ. P(rГёd)?`,options:[fmt(pR),fmt(Math.round(b/tot*100)/100),fmt(Math.round(r/(r+b+1)*100)/100),"1"],correct:0,explanation:`P(rГёd) = ${r}/${tot} = ${fmt(pR)}`};},
    ()=>{const n=rnd(5,10),k=rnd(2,Math.min(4,n-1)),C=fak(n)/(fak(k)*fak(n-k));return{type:"input",text:`VГҰlg ${k} ud af ${n} (rГҰkkefГёlge irrelevant). Antal muligheder?`,answer:String(C),accept:[String(C)],explanation:`K(${n},${k}) = ${C}`};},

    // Sandsynlighedsfelt i tabelform
    ()=>{const r=rnd(1,4),b=rnd(1,4),g=rnd(1,3);const tot=r+b+g;const pR=Math.round(r/tot*100)/100,pB=Math.round(b/tot*100)/100,pG=Math.round(g/tot*100)/100;return{type:"mc",text:`En pose indeholder ${r} rГёde, ${b} blГҘ og ${g} grГёnne kugler. Der trГҰkkes Г©n tilfГҰldig kugle. Hvad er P(blГҘ)?`,options:[fmt(pB),fmt(pR),fmt(pG),fmt(Math.round((r+g)/tot*100)/100)],correct:0,explanation:`P(blГҘ) = ${b}/${tot} = ${fmt(pB)}`};},
    // Betinget sandsynlighed
    ()=>{const pA=rnd(2,7)/10,pBgA=rnd(3,8)/10,pAnB=Math.round(pA*pBgA*100)/100;return{type:"input",text:`P(A) = ${fmt(pA)} og P(B|A) = ${fmt(pBgA)}. Beregn P(A вҲ© B). (2 dec)`,answer:fmt(pAnB),accept:[fmt(pAnB),String(pAnB)],explanation:`P(A вҲ© B) = P(A) В· P(B|A) = ${fmt(pA)} В· ${fmt(pBgA)} = ${fmt(pAnB)}`};},
    // Bayes
    ()=>{const pA=rnd(2,5)/10,pBgA=rnd(5,9)/10,pBgNotA=rnd(1,4)/10;const pNotA=Math.round((1-pA)*10)/10;const pB=Math.round((pA*pBgA+pNotA*pBgNotA)*100)/100;const pAgB=Math.round(pA*pBgA/pB*100)/100;return{type:"input",text:`P(A) = ${fmt(pA)}, P(B|A) = ${fmt(pBgA)}, P(B|Aб¶ң) = ${fmt(pBgNotA)}. Brug Bayes: P(A|B) = ? (2 dec)`,answer:fmt(pAgB),accept:[fmt(pAgB),String(pAgB)],explanation:`P(B) = ${fmt(pA)}В·${fmt(pBgA)} + ${fmt(pNotA)}В·${fmt(pBgNotA)} = ${fmt(pB)}. P(A|B) = ${fmt(pA)}В·${fmt(pBgA)}/${fmt(pB)} = ${fmt(pAgB)}`};},
    // Varians og std binomial
    ()=>{const n=rnd(5,20),p=rnd(2,8)/10,mu=Math.round(n*p*100)/100,vari=Math.round(n*p*(1-p)*100)/100,std=Math.round(Math.sqrt(n*p*(1-p))*100)/100;return{type:"input",text:`X ~ b(n=${n}, p=${fmt(p)}). Hvad er standardafvigelsen Пғ? (2 dec)`,answer:fmt(std),accept:[fmt(std),String(std)],explanation:`Пғ = вҲҡ(nВ·pВ·(1вҲ’p)) = вҲҡ(${n}В·${fmt(p)}В·${fmt(1-p)}) = вҲҡ${fmt(vari)} = ${fmt(std)}`};},
    ()=>{const n=rnd(3,10),p=rnd(1,5)/10;return{type:"mc",text:`Hvad angiver X ~ b(n=${n}, p=${fmt(p)})?`,options:[`Binomialfordeling, ${n} forsГёg, p=${fmt(p)}`,"Normalfordeling","Poissonfordeling"],correct:0,explanation:`b(n,p) = binomialfordeling med n=${n} og p=${fmt(p)}.`};},
  ],
  F8:[
    ()=>{const alpha=Math.random()>0.5?0.05:0.01,reject=Math.random()>0.5,p=reject?rndF(0.001,alpha-0.001,3):rndF(alpha+0.001,0.2,3);return{type:"mc",text:`ПҮВІ-test: p = ${fmt(p)}, Оұ = ${fmt(alpha)}. Konklusion?`,options:["Forkast HвӮҖ вҖ” statistisk signifikant sammenhГҰng","Accepter HвӮҖ вҖ” ingen statistisk signifikant sammenhГҰng"],correct:reject?0:1,explanation:`p ${reject?'<':'>'} Оұ вҶ’ ${reject?"forkast":"accepter"} HвӮҖ.`};},
    ()=>{const phat=rndF(0.2,0.8,2),se=rndF(0.02,0.07,3),upper=Math.round((phat+1.96*se)*1000)/1000;return{type:"input",text:`pМӮ = ${fmt(phat)}, SE = ${fmt(se)}. Гҳvre grГҰnse 95% KI? (3 dec)`,answer:fmt(upper),accept:[fmt(upper),String(upper)],explanation:`${fmt(phat)} + 1,96В·${fmt(se)} = ${fmt(upper)}`};},
    ()=>{const phat=rndF(0.2,0.8,2),se=rndF(0.02,0.07,3),lower=Math.round((phat-1.96*se)*1000)/1000;return{type:"input",text:`pМӮ = ${fmt(phat)}, SE = ${fmt(se)}. Nedre grГҰnse 95% KI? (3 dec)`,answer:fmt(lower),accept:[fmt(lower),String(lower)],explanation:`${fmt(phat)} вҲ’ 1,96В·${fmt(se)} = ${fmt(lower)}`};},
    ()=>{const r=rnd(2,4),c=rnd(2,5),df=(r-1)*(c-1);return{type:"input",text:`Frihedsgrader for ${r}Г—${c} krydstabel?`,answer:String(df),accept:[String(df)],explanation:`(${r}вҲ’1)В·(${c}вҲ’1) = ${df}`};},
    ()=>{const r1=rnd(50,150),r2=rnd(50,150),tot=r1+r2,c1=rnd(30,Math.floor(tot*0.7)),e11=Math.round(r1*c1/tot*100)/100;return{type:"input",text:`RГҰkketotal=${r1}, kolonnetotal=${c1}, n=${tot}. Forventet EвӮҒвӮҒ? (2 dec)`,answer:fmt(e11),accept:[fmt(e11),String(e11)],explanation:`EвӮҒвӮҒ = ${r1}В·${c1}/${tot} = ${fmt(e11)}`};},

    // Frihedsgrader fra konkret tabel
    ()=>{const r=rnd(2,4),c=rnd(2,5),df=(r-1)*(c-1);const rword=["to","tre","fire"][r-2],cword=["to","tre","fire","fem"][c-2];return{type:"input",text:`En ПҮВІ-test undersГёger sammenhГҰng mellem ${rword} kategorier (rГҰkker) og ${cword} kategorier (kolonner). Hvad er antallet af frihedsgrader?`,answer:String(df),accept:[String(df)],explanation:`Frihedsgrader = (${r}вҲ’1)В·(${c}вҲ’1) = ${r-1}В·${c-1} = ${df}`};},
    // Fortolk KI i kontekst  
    ()=>{const phat=rndF(0.2,0.8,2),se=rndF(0.02,0.06,2),lower=Math.round((phat-1.96*se)*100)/100,upper=Math.round((phat+1.96*se)*100)/100;return{type:"mc",text:`Et 95% konfidensinterval for andelen af elever der bestГҘr er [${fmt(lower)}; ${fmt(upper)}]. Hvad betyder dette?`,options:[`Vi er 95% sikre pГҘ at den sande andel ligger mellem ${fmt(lower)} og ${fmt(upper)}`,`95% af eleverne bestГҘr`,`PrГҰcis ${fmt(phat)*100}% bestГҘr med sikkerhed`,`Intervallet indeholder altid den sande andel`],correct:0,explanation:`Et 95% KI betyder at metoden med 95% sandsynlighed giver et interval der indeholder den sande populationsandel.`};},
    // p-vГҰrdi fortolkning
    ()=>{const alpha=0.05,p=rndF(0.001,0.15,3),reject=p<alpha;return{type:"mc",text:`I en ПҮВІ-test fГҘs p = ${fmt(p)}. Signifikansniveauet er Оұ = 0,05. Hvad er den korrekte konklusion?`,options:[reject?`p < Оұ, sГҘ vi forkaster HвӮҖ. Der er statistisk signifikant sammenhГҰng.`:`p > Оұ, sГҘ vi accepterer HвӮҖ. Der er ingen statistisk signifikant sammenhГҰng.`,reject?`p < Оұ, sГҘ vi accepterer HвӮҖ`:`p > Оұ, sГҘ vi forkaster HвӮҖ`,"Vi kan ikke konkludere noget","p-vГҰrdien er for lille til at bruge"],correct:0,explanation:`p = ${fmt(p)} er ${reject?'mindre end':'stГёrre end'} Оұ = 0,05 вҶ’ ${reject?'forkast HвӮҖ':'accepter HвӮҖ'}.`};},
    ()=>{return{type:"mc",text:`HвӮҖ i en ПҮВІ-uafhГҰngighedstest?`,options:["Ingen sammenhГҰng mellem de to variable","Der er sammenhГҰng","MiddelvГҰrdierne er ens"],correct:0,explanation:`HвӮҖ: ingen sammenhГҰng. HвӮҒ: sammenhГҰng.`};},
  ],
};

let selected="F1",sessionQs=[],qIndex=0,correct=0,wrong=0,maxCount=5,answered=false;

function startAllForloeb(){
  // Pick 2 questions from each forloeb = 16 questions total overview
  const perForloeb = maxCount <= 5 ? 1 : maxCount <= 10 ? 1 : 2;
  sessionQs = [];
  Object.keys(FORLOEB).forEach(key => {
    const gens = shuffle([...GENERATORS[key]]);
    let added = 0, attempts = 0;
    while(added < perForloeb && attempts < perForloeb * 6){
      attempts++;
      try{
        const q = gens[added % gens.length]();
        if(q){ q._forloeb = key; sessionQs.push(q); added++; }
      }catch(e){}
    }
  });
  sessionQs = shuffle(sessionQs);
  qIndex=0; correct=0; wrong=0;
  show("screen-quiz"); renderQuestion();
}

function init(){
  const grid=document.getElementById("forloeb-grid");
  Object.entries(FORLOEB).forEach(([key,name])=>{
    const btn=document.createElement("button");
    btn.className="f-btn"+(key===selected?" active":"");
    btn.innerHTML=`<span style="font-size:11px;color:#888">${key}</span><br>${name}`;
    btn.onclick=()=>selectForloeb(key,btn);
    grid.appendChild(btn);
  });
}
function selectForloeb(key,btn){selected=key;document.querySelectorAll(".f-btn").forEach(b=>b.classList.remove("active"));btn.classList.add("active");}
function setCount(n,btn){maxCount=n;document.querySelectorAll("#count-btns .f-btn").forEach(b=>b.classList.remove("active"));btn.classList.add("active");}
function show(id){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));document.getElementById(id).classList.add("active");}
function goHome(){show("screen-select");}
function generateQuestions(){
  const gens=shuffle([...GENERATORS[selected]]);
  const result=[];let attempts=0;
  while(result.length<maxCount&&attempts<maxCount*6){
    attempts++;
    try{const q=gens[result.length%gens.length]();if(q)result.push(q);}catch(e){}
  }
  return result;
}
function startQuiz(){
  sessionQs=generateQuestions();
  qIndex=0;correct=0;wrong=0;
  show("screen-quiz");renderQuestion();
}
function renderQuestion(){
  answered=false;
  const q=sessionQs[qIndex];
  document.getElementById("progress-fill").style.width=Math.round(qIndex/sessionQs.length*100)+"%";
  document.getElementById("q-counter").textContent=(qIndex+1)+" / "+sessionQs.length;
  document.getElementById("q-forloeb").textContent=FORLOEB[q._forloeb||selected];
  document.getElementById("q-type-label").textContent=q.type==="mc"?"VГҰlg det rigtige svar":"Skriv dit svar";
  document.getElementById("q-text").textContent=q.text;
  document.getElementById("feedback").className="feedback";
  document.getElementById("next-btn").style.display="none";
  const graphDiv=document.getElementById("q-graph");
  graphDiv.innerHTML="";
  if(q.graph){
    const plotId='plot_'+Date.now();
    const inner=document.createElement('div');
    inner.id=plotId;
    const wrap=document.createElement('div');
    wrap.className='plot-wrap';
    wrap.appendChild(inner);
    graphDiv.appendChild(wrap);
    const spec=q.graph;
    requestAnimationFrame(()=>{
      requestAnimationFrame(()=>{
        if(document.getElementById(plotId)){
          Plotly.newPlot(plotId,spec.traces,spec.layout,PLOTLY_CONFIG);
        }
      });
    });
  }
  const mcDiv=document.getElementById("mc-options");
  const inputDiv=document.getElementById("input-area");
  if(q.type==="mc"){
    inputDiv.style.display="none";mcDiv.innerHTML="";
    q.options.forEach((opt,i)=>{
      const btn=document.createElement("button");btn.className="mc-option";btn.textContent=opt;
      btn.onclick=()=>checkMC(i,btn,q);mcDiv.appendChild(btn);
    });
  } else {
    mcDiv.innerHTML="";inputDiv.style.display="block";
    const inp=document.getElementById("answer-input");inp.value="";inp.disabled=false;
    setTimeout(()=>inp.focus(),150);
  }
}
function checkMC(chosen,btn,q){
  if(answered)return;answered=true;
  document.querySelectorAll(".mc-option").forEach(b=>{b.onclick=null;b.classList.add("disabled");});
  if(chosen===q.correct){btn.classList.remove("disabled");btn.classList.add("correct");showFeedback(true,q.explanation);correct++;}
  else{btn.classList.remove("disabled");btn.classList.add("wrong");document.querySelectorAll(".mc-option")[q.correct].classList.remove("disabled");document.querySelectorAll(".mc-option")[q.correct].classList.add("show-correct");showFeedback(false,"Forkert. "+q.explanation);wrong++;}
  document.getElementById("next-btn").style.display="block";
}
function checkInput(){
  if(answered)return;
  const q=sessionQs[qIndex];
  const val=document.getElementById("answer-input").value.trim().replace(",",".");
  const accepts=q.accept.map(a=>a.replace(",",".").toLowerCase().trim());
  const ok=accepts.includes(val.toLowerCase());
  answered=true;document.getElementById("answer-input").disabled=true;
  if(ok){showFeedback(true,q.explanation);correct++;}
  else{showFeedback(false,"Forkert вҖ” svaret er: "+q.answer+". "+q.explanation);wrong++;}
  document.getElementById("next-btn").style.display="block";
}
function showFeedback(ok,msg){
  const fb=document.getElementById("feedback");
  fb.className="feedback "+(ok?"correct":"wrong");
  fb.textContent=(ok?"Rigtigt! ":"")+msg;
}
function nextQuestion(){qIndex++;if(qIndex>=sessionQs.length)showResult();else renderQuestion();}
function showResult(){
  const tot=correct+wrong;
  document.getElementById("res-correct").textContent=correct;
  document.getElementById("res-wrong").textContent=wrong;
  document.getElementById("res-pct").textContent=Math.round(correct/tot*100)+"%";
  show("screen-result");
}
init();
</script>
