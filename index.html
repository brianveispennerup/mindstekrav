<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mindstekrav — Matematiktræner</title>
<script src="https://cdn.jsdelivr.net/npm/plotly.js-dist@2.27.0/plotly.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;padding:1.5rem;background:#f5f5f0;min-height:100vh;max-width:700px;margin:0 auto}
.screen{display:none}.screen.active{display:block}
.card{background:#fff;border:1px solid #e0e0d8;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.forloeb-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:10px;margin-top:1rem}
.f-btn{background:#fff;border:1px solid #ccc;border-radius:8px;padding:0.75rem 1rem;cursor:pointer;font-size:13px;font-weight:500;color:#222;text-align:left;transition:background 0.15s;line-height:1.5}
.f-btn:hover{background:#f0f0ec}
.f-btn.active{border:2px solid #185FA5;background:#E6F1FB;color:#0C447C}
.q-label{font-size:11px;color:#888;margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px}
.q-text{font-size:15px;color:#111;line-height:1.75;margin-bottom:1.25rem}
.mc-option{display:block;width:100%;text-align:left;background:#fff;border:1px solid #ddd;border-radius:8px;padding:0.65rem 1rem;margin-bottom:8px;cursor:pointer;font-size:14px;color:#222;transition:all 0.1s}
.mc-option:hover{background:#f5f5f0;border-color:#aaa}
.mc-option.correct{background:#EAF3DE;border:2px solid #3B6D11;color:#27500A;pointer-events:none}
.mc-option.wrong{background:#FCEBEB;border:2px solid #A32D2D;color:#791F1F;pointer-events:none}
.mc-option.show-correct{background:#EAF3DE;border:2px solid #3B6D11;color:#27500A;pointer-events:none}
.mc-option.disabled{pointer-events:none;opacity:0.5}
.input-row{display:flex;gap:8px;align-items:center;margin-bottom:1rem}
.input-row input{flex:1;padding:0.55rem 0.75rem;border:1px solid #ccc;border-radius:8px;font-size:15px;background:#fff;color:#111}
.input-row input:disabled{background:#f5f5f0;color:#888}
.feedback{border-radius:8px;padding:0.75rem 1rem;font-size:14px;margin-bottom:1rem;display:none;line-height:1.6}
.feedback.correct{background:#EAF3DE;color:#27500A;display:block}
.feedback.wrong{background:#FCEBEB;color:#791F1F;display:block}
.score-row{display:flex;gap:12px;margin-bottom:1rem}
.score-box{background:#f5f5f0;border-radius:8px;padding:0.75rem 1rem;flex:1;text-align:center}
.score-box .num{font-size:26px;font-weight:500;color:#111}
.score-box .lbl{font-size:12px;color:#666;margin-top:2px}
button.primary{background:#fff;border:1px solid #ccc;border-radius:8px;padding:0.6rem 1.2rem;font-size:14px;cursor:pointer;color:#222;transition:background 0.15s}
button.primary:hover{background:#f0f0ec}
.progress-bar{height:4px;background:#e8e8e2;border-radius:2px;margin-bottom:1.25rem}
.progress-fill{height:4px;background:#185FA5;border-radius:2px;transition:width 0.3s}
.plot-wrap{margin:0.75rem 0;border:1px solid #e0e0d8;border-radius:8px;overflow:hidden;background:#fff}
h1{font-size:18px;font-weight:600;color:#111;margin-bottom:4px}
.sub{font-size:14px;color:#666;margin-bottom:1rem}
</style>
</head>
<body>

<div id="screen-select" class="screen active">
  <div class="card">
    <h1>Mindstekrav — matematiktræner</h1>
    <p class="sub">Vælg et forløb. Opgaverne genereres med tilfældige tal og interaktive grafer.</p>
    <div class="forloeb-grid" id="forloeb-grid"></div>
  </div>
  <div class="card">
    <p style="font-size:13px;color:#666;margin-bottom:8px">Antal opgaver per session</p>
    <div style="display:flex;gap:8px;flex-wrap:wrap" id="count-btns">
      <button class="f-btn active" onclick="setCount(5,this)">5</button>
      <button class="f-btn" onclick="setCount(10,this)">10</button>
      <button class="f-btn" onclick="setCount(15,this)">15</button>
      <button class="f-btn" onclick="setCount(999,this)">Alle</button>
    </div>
  </div>
  <button class="primary" onclick="startQuiz()" style="width:100%;padding:0.8rem;font-size:15px">Start træning</button>
  <button class="primary" onclick="startAllForloeb()" style="width:100%;padding:0.8rem;font-size:15px;margin-top:8px;border-color:#185FA5;color:#185FA5">Gennemgå alle forløb (overblik)</button>
</div>

<div id="screen-quiz" class="screen">
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <span class="q-label" id="q-forloeb"></span>
      <span style="font-size:12px;color:#888" id="q-counter"></span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <p class="q-label" id="q-type-label"></p>
    <div id="q-graph"></div>
    <p class="q-text" id="q-text"></p>
    <div id="mc-options"></div>
    <div id="input-area" style="display:none">
      <div class="input-row">
        <input type="text" id="answer-input" placeholder="Skriv dit svar..." onkeydown="if(event.key==='Enter')checkInput()">
        <button class="primary" onclick="checkInput()">Tjek</button>
      </div>
    </div>
    <div class="feedback" id="feedback"></div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="primary" id="next-btn" onclick="nextQuestion()" style="display:none;flex:1">Næste opgave</button>
      <button class="primary" onclick="goHome()" style="font-size:13px;color:#999">Afslut</button>
    </div>
  </div>
</div>

<div id="screen-result" class="screen">
  <div class="card">
    <h1 style="margin-bottom:1rem">Resultat</h1>
    <div class="score-row">
      <div class="score-box"><div class="num" id="res-correct">0</div><div class="lbl">Rigtige</div></div>
      <div class="score-box"><div class="num" id="res-wrong">0</div><div class="lbl">Forkerte</div></div>
      <div class="score-box"><div class="num" id="res-pct">0%</div><div class="lbl">Score</div></div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="primary" onclick="startQuiz()" style="flex:1">Prøv igen</button>
      <button class="primary" onclick="goHome()" style="flex:1">Vælg forløb</button>
    </div>
  </div>
</div>

<script>
const FORLOEB={
  F0:"Grundlæggende færdigheder",
  F1:"Lineære funktioner",
  F2:"Eksponentielle funktioner",
  F3:"Deskriptiv statistik",
  F4:"Finansiel regning"
};

function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function rndF(a,b,d){return parseFloat((Math.random()*(b-a)+a).toFixed(d));}
function shuffle(a){let r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}
function fmt(n){return String(n).replace('.',',');}
function fak(n){return n<=1?1:n*fak(n-1);}
function linspace(a,b,n){return Array.from({length:n},(_,i)=>a+(b-a)*i/(n-1));}

const PLOTLY_CONFIG={responsive:true,displayModeBar:false};
const PLOTLY_LAYOUT_BASE={
  margin:{l:50,r:20,t:20,b:50},
  plot_bgcolor:'#fafaf8',
  paper_bgcolor:'#fff',
  font:{family:'system-ui',size:12,color:'#555'},
  xaxis:{gridcolor:'#e8e8e2',zerolinecolor:'#aaa',zerolinewidth:1.5},
  yaxis:{gridcolor:'#e8e8e2',zerolinecolor:'#aaa',zerolinewidth:1.5},
  showlegend:false,
  height:280
};

function makePlotSpec(traces,layout){return{traces,layout};}

function plotLines(traces,xrange,yrange){
  const layout=Object.assign({},PLOTLY_LAYOUT_BASE,{
    xaxis:Object.assign({},PLOTLY_LAYOUT_BASE.xaxis,{range:xrange}),
    yaxis:Object.assign({},PLOTLY_LAYOUT_BASE.yaxis,{range:yrange})
  });
  return makePlotSpec(traces,layout);
}

function makeFuncTrace(fn,xMin,xMax,color,name,dash){
  const xs=linspace(xMin,xMax,400);
  return{x:xs,y:xs.map(fn),mode:'lines',line:{color:color||'#185FA5',width:2.5,dash:dash||'solid'},name:name||''};
}

function makeBarTrace(xs,ys,color){
  return{x:xs,y:ys,type:'bar',marker:{color:color||'#B5D4F4',line:{color:'#185FA5',width:1}},width:0.5};
}

function makeScatterTrace(xs,ys,color,size){
  return{x:xs,y:ys,mode:'markers',marker:{color:color||'#C0392B',size:size||8}};
}

// ---- QUESTION GENERATORS ----
const GENERATORS={
  F0:[
    // 1. Løs ligning x² + k = c
    ()=>{
      const k=rnd(1,10),c=rnd(k+1,k+20),x=Math.round(Math.sqrt(c-k));
      if(x*x!==c-k)return GENERATORS.F0[0]();
      return{type:"input",
        text:`Løs ligningen x² + ${k} = ${c}.`,
        answer:String(x),
        accept:[String(x),String(-x),"x="+x,"±"+x],
        explanation:`x² = ${c-k} → x = ±√${c-k} = ±${x}`
      };
    },
    // 2. Reducér udtryk a(bx - cy) - (dx - ey)
    ()=>{
      const a=rnd(2,5),bx=rnd(1,6),by=rnd(1,6),c=rnd(2,5),dx=rnd(1,6),dy=rnd(1,6);
      const rx=a*bx-c*dx, ry=a*by-c*dy;
      const ans=(rx===0?"":rx+"x")+(ry===0?"":(ry>0?(rx===0?"":"+")+""+ry:""+ry)+"y");
      const ansFull=(rx===0?"":rx+"x")+(ry===0?"":ry>=0?" + "+ry+"y":" − "+Math.abs(ry)+"y");
      const ansClean=(rx===0?"":rx+"x")+(ry===0?"":ry>=0?`+ ${ry}y`:`− ${Math.abs(ry)}y`);
      return{type:"input",
        text:`Reducér følgende udtryk mest muligt: ${a}(${bx}x − ${by}y) − (${c*dx}x − ${c*dy}y)`,
        answer:ansClean.trim(),
        accept:[ansClean.trim(), rx+"x"+(ry>=0?"+"+ry:""+ry)+"y", String(rx)+"x"+(ry>=0?"+":"")+String(ry)+"y"],
        explanation:`= ${a*bx}x − ${a*by}y − ${c*dx}x + ${c*dy}y = ${ansClean.trim()}`
      };
    },
    // 3. Løs eksponentiel ligning a·bˣ = c
    ()=>{
      const base=rnd(2,5),exp=rnd(2,4),bv=rnd(1,4),rhs=bv*Math.pow(base,exp);
      return{type:"input",
        text:`Løs ligningen ${bv} · ${base}ˣ = ${rhs}.`,
        answer:String(exp),
        accept:[String(exp),"x="+exp,"x = "+exp],
        explanation:`${bv} · ${base}ˣ = ${rhs} → ${base}ˣ = ${rhs/bv} = ${base}^${exp} → x = ${exp}`
      };
    },
  ],

  F1:[
    // 1. Bestem forskriften fra to punkter
    ()=>{
      const a=rnd(-4,4)||1, b=rnd(-8,8);
      const x1=rnd(0,4), y1=a*x1+b, x2=x1+rnd(1,4), y2=a*x2+b;
      const fStr=`f(x) = ${a}x ${b>=0?'+ '+b:'− '+Math.abs(b)}`;
      return{type:"input",
        text:`Bestem forskriften for den lineære funktion, hvis graf går gennem punkterne (x₁, y₁) = (${x1}, ${y1}) og (x₂, y₂) = (${x2}, ${y2}).`,
        answer:fStr,
        accept:[fStr,`${a}x${b>=0?'+'+b:''+b}`,`${a}x ${b>=0?'+ '+b:'- '+Math.abs(b)}`],
        explanation:`a = (${y2}−${y1})/(${x2}−${x1}) = ${a}. b = ${y1}−${a}·${x1} = ${b}. Forskrift: ${fStr}.`
      };
    },
    // 2. Tegn graf + forklar a og b
    ()=>{
      const a=rnd(-4,4)||1, b=rnd(-8,8);
      const fn=x=>a*x+b;
      const t1=makeFuncTrace(fn,-5,5,'#185FA5');
      const tP=makeScatterTrace([0],[b],'#C0392B',9);
      const graph=plotLines([t1,tP],[-5,5],[Math.min(fn(-5),fn(5))-2,Math.max(fn(-5),fn(5))+2]);
      return{type:"mc",
        text:`Grafen viser f(x) = ${a}x ${b>=0?'+ '+b:'− '+Math.abs(b)}. Hvad er den røde prikkes betydning?`,
        graph,
        options:[
          `Det er skæringspunktet med y-aksen: (0, ${b})`,
          `Det er nulpunktet`,
          `Det er toppunktet`,
          `Det er hældningskoefficienten`
        ],
        correct:0,
        explanation:`Den røde prik er (0, ${b}) — skæringen med y-aksen, svarende til b = ${b}. Hældningen er a = ${a}.`
      };
    },
    // 3. Bestem nulpunkt
    ()=>{
      const a=rnd(1,5), b=rnd(-20,20);
      const np=-b/a;
      if(!Number.isInteger(np)) return GENERATORS.F1[2]();
      return{type:"input",
        text:`En funktion er givet ved f(x) = ${a}x ${b>=0?'+ '+b:'− '+Math.abs(b)}. Bestem nulpunktet.`,
        answer:String(np),
        accept:[String(np),"x="+np,"x = "+np],
        explanation:`Sæt f(x) = 0: ${a}x ${b>=0?'+ '+b:'− '+Math.abs(b)} = 0 → x = ${np}`
      };
    },
    // 4. Aflæs definitionsmængde og værdimængde fra begrænset funktion (med graf)
    ()=>{
      const a=rnd(-3,3)||1, b=rnd(-5,5);
      const x1=rnd(-2,1), x2=x1+rnd(3,6);
      const y1=a*x1+b, y2=a*x2+b;
      const yMin=Math.min(y1,y2), yMax=Math.max(y1,y2);
      const t1={x:[x1,x2],y:[y1,y2],mode:'lines',line:{color:'#185FA5',width:2.5}};
      const tStart=makeScatterTrace([x1],[y1],'#185FA5',10);
      const tEnd={x:[x2],y:[y2],mode:'markers',marker:{color:'#185FA5',size:10,symbol:'circle-open',line:{width:2,color:'#185FA5'}}};
      const graph=plotLines([t1,tStart,tEnd],[x1-2,x2+2],[yMin-2,yMax+2]);
      const dm=`[${x1}; ${x2}]`;
      const vm=a>0?`[${y1}; ${y2}]`:`[${y2}; ${y1}]`;
      return{type:"mc",
        text:`Grafen viser en begrænset lineær funktion. Hvad er definitionsmængden?`,
        graph,
        options:[dm,`[${y1}; ${y2}]`,`]${x1}; ${x2}[`,`[${x1-1}; ${x2+1}]`],
        correct:0,
        explanation:`Definitionsmængden aflæses på x-aksen: Dm = ${dm}. Værdimængden er Vm = ${vm}.`
      };
    },
    // 5. Tekstopgave - opstil funktionsforskrift (taxa)
    ()=>{
      const s=rnd(20,60), p=rnd(8,20), k=rnd(3,15), t=s+p*k;
      return{type:"input",
        text:`En taxa koster ${s} kr. i startgebyr og ${p} kr./km. Opskriv en funktionsforskrift f(x) for den samlede pris som funktion af antal kørte kilometer. Hvad er f(${k})?`,
        answer:String(t),
        accept:[String(t),t+" kr",t+" kr."],
        explanation:`f(x) = ${s} + ${p}x. f(${k}) = ${s} + ${p}·${k} = ${t} kr.`
      };
    },
  ],

  F2:[
    // 1. Begyndelsesværdi og vækstrate fra f(x) = b·aˣ
    ()=>{
      const b=rnd(2,50), a=rndF(1.05,1.5,2);
      return{type:"mc",
        text:`En eksponentiel funktion har følgende forskrift: f(x) = ${b} · ${fmt(a)}ˣ. Hvad er funktionens begyndelsesværdi og vækstrate?`,
        options:[
          `Begyndelsesværdi: ${b}, vækstrate: ${fmt(Math.round((a-1)*100))}%`,
          `Begyndelsesværdi: ${fmt(a)}, vækstrate: ${b}%`,
          `Begyndelsesværdi: ${b}, vækstrate: ${fmt(a)}`,
          `Begyndelsesværdi: 1, vækstrate: ${fmt(a)}`
        ],
        correct:0,
        explanation:`f(0) = ${b}·1 = ${b} er begyndelsesværdien. Vækstraten r = a − 1 = ${fmt(a)} − 1 = ${fmt(Math.round((a-1)*100))}%.`
      };
    },
    // 2. Identificér forskriften fra graf (3 muligheder)
    ()=>{
      const b=rnd(2,8);
      const rising=Math.random()>0.5;
      const a=rising?rndF(1.1,1.6,2):rndF(0.5,0.9,2);
      const fn=x=>b*Math.pow(a,x);
      const xMax=rising?8:10, xMin=-3;
      const t1=makeFuncTrace(fn,xMin,xMax,'#185FA5');
      const yVals=linspace(xMin,xMax,100).map(fn);
      const graph=plotLines([t1],[xMin,xMax],[0,Math.min(Math.max(...yVals)*1.1,40)]);
      // Make two wrong options
      const a2=rising?rndF(0.5,0.89,2):rndF(1.1,1.6,2); // wrong direction
      const a3=rising?rndF(1.1,1.6,2):rndF(0.5,0.9,2);  // right direction wrong values
      const b3=b+rnd(2,6);
      return{type:"mc",
        text:`Grafen for en eksponentiel funktion er tegnet i koordinatsystemet. Bestem hvilken af de 3 følgende forskrifter, der svarer til grafen.`,
        graph,
        options:[
          `f(x) = ${b} · ${fmt(a)}ˣ`,
          `g(x) = ${b} · ${fmt(a2)}ˣ`,
          `h(x) = ${b3} · ${fmt(a3)}ˣ`
        ],
        correct:0,
        explanation:`Begyndelsesværdien (x=0) er ${b}, og funktionen er ${rising?"voksende (a > 1)":"aftagende (a < 1)"}. Det passer på f(x) = ${b} · ${fmt(a)}ˣ.`
      };
    },
    // 3. Aflæs fordoblingskonstanten fra graf
    ()=>{
      const b=rndF(1,4,1), a=rndF(1.15,1.5,2);
      const T=Math.round(Math.log(2)/Math.log(a)*10)/10;
      const xMax=Math.ceil(T*3.5);
      const fn=x=>b*Math.pow(a,x);
      const t1=makeFuncTrace(fn,0,xMax,'#185FA5');
      const tMark=makeScatterTrace([T],[fn(T)],'#C0392B',10);
      const graph=plotLines([t1,tMark],[0,xMax],[0,fn(xMax)*1.1]);
      return{type:"input",
        text:`Grafen for en voksende eksponentiel funktion er tegnet nedenfor. Aflæs fordoblingskonstanten T₂. (1 decimal)`,
        graph,
        answer:fmt(T),
        accept:[fmt(T),String(T)],
        explanation:`Fordoblingskonstanten er den x-værdi hvor funktionen fordobles. T₂ = ${fmt(T)}.`
      };
    },
    // 4. Voksende eller aftagende - begrund
    ()=>{
      const rising=Math.random()>0.5;
      const a=rising?rndF(1.1,1.8,2):rndF(0.5,0.9,2);
      const b=rnd(2,30);
      return{type:"mc",
        text:`Lad f(x) = ${b} · ${fmt(a)}ˣ og g(x) = ${b} · ${fmt(rising?rndF(0.5,0.9,2):rndF(1.1,1.8,2))}ˣ. Hvilken af funktionerne er voksende, og hvilken er aftagende? Begrund dit svar.`,
        options:[
          `f(x) er ${rising?"voksende":"aftagende"} fordi a = ${fmt(a)} er ${a>1?"større end 1":"mindre end 1"}`,
          `f(x) er ${rising?"aftagende":"voksende"} fordi b = ${b} er positiv`,
          `Begge funktioner er voksende`,
          `Begge funktioner er aftagende`
        ],
        correct:0,
        explanation:`Når a > 1 er funktionen voksende, når 0 < a < 1 er den aftagende. a = ${fmt(a)} er ${a>1?"større end 1 → voksende":"mindre end 1 → aftagende"}.`
      };
    },
  ],

  F3:[
    // 1. Lav pindediagram - aflæs typetal
    ()=>{
      const vals=[1,2,3,4,5,6];
      const hyps=Array.from({length:6},()=>rnd(5,25));
      const typIdx=hyps.indexOf(Math.max(...hyps));
      const tot=hyps.reduce((a,b)=>a+b,0);
      const t=makeBarTrace(vals,hyps,'#B5D4F4');
      const graph=plotLines([t],[0.3,6.7],[0,Math.max(...hyps)+3]);
      return{type:"input",
        text:`Nedenstående pindediagram viser fordelingen af "antal øjne" ved ${tot} kast med en terning. Aflæs typetallet.`,
        graph,
        answer:String(vals[typIdx]),
        accept:[String(vals[typIdx])],
        explanation:`Den højeste søjle er ved ${vals[typIdx]} med hyppighed ${hyps[typIdx]} — det er typetallet.`
      };
    },
    // 2. Bestem typetal og gennemsnit fra hyppighedstabel
    ()=>{
      const n=rnd(15,30);
      const vals=[1,2,3,4,5,6];
      const hyps=Array.from({length:6},()=>rnd(1,Math.floor(n/3)));
      const tot=hyps.reduce((a,b)=>a+b,0);
      const typIdx=hyps.indexOf(Math.max(...hyps));
      const mean=Math.round(vals.reduce((s,v,i)=>s+v*hyps[i],0)/tot*100)/100;
      const typtal=vals[typIdx];
      return{type:"input",
        text:`Nedenstående tabel viser hyppighed og frekvens for ${tot} kast med en terning:\nAntal øjne: 1, 2, 3, 4, 5, 6\nHyppighed: ${hyps.join(', ')}\nBestem typetallet.`,
        answer:String(typtal),
        accept:[String(typtal)],
        explanation:`Typetallet er den observation med højest hyppighed. Hyppighed ${hyps[typIdx]} for ${typtal} øjne er højest → typetal = ${typtal}. Gennemsnit = ${fmt(mean)}.`
      };
    },
    // 3. Beregn frekvenser og summerede frekvenser fra karaktertabel
    ()=>{
      const chars=[-3,0,2,4,7,10,12];
      const hyps=[0,rnd(1,3),rnd(2,6),rnd(2,6),rnd(4,10),rnd(2,6),rnd(1,3)];
      const tot=hyps.reduce((a,b)=>a+b,0);
      const idx=rnd(2,5);
      const freq=Math.round(hyps[idx]/tot*100)/100;
      let cumHyp=0;
      for(let i=0;i<=idx;i++) cumHyp+=hyps[i];
      const cumFreq=Math.round(cumHyp/tot*100)/100;
      return{type:"input",
        text:`Nedenstående tabel viser fordelingen af karakterer til en eksamen for ${tot} elever:\nKarakter: -3, 00, 02, 4, 7, 10, 12\nHyppighed: ${hyps.join(', ')}\nHvad er frekvensen for karakteren ${chars[idx]}? (2 dec)`,
        answer:fmt(freq),
        accept:[fmt(freq),String(freq)],
        explanation:`Frekvens for ${chars[idx]}: ${hyps[idx]} / ${tot} = ${fmt(freq)}. Summeret frekvens til og med ${chars[idx]}: ${fmt(cumFreq)}.`
      };
    },
    // 4. Aflæs kvartilsæt fra summeret frekvensgraf
    ()=>{
      const ages=[10,20,25,30,35,40,50,60];
      const cf=[rnd(0,5),rnd(10,20),rnd(25,35),rnd(45,58),rnd(65,75),rnd(80,88),rnd(95,98),100];
      function readQ(p){let i=0;while(i<cf.length-1&&cf[i]<p)i++;return ages[i];}
      const Q1=readQ(25),Q2=readQ(50),Q3=readQ(75);
      const t1={x:ages,y:cf,mode:'lines+markers',line:{color:'#185FA5',width:2.5},marker:{color:'#185FA5',size:7}};
      const tQ1={x:[ages[0],ages[ages.length-1]],y:[25,25],mode:'lines',line:{color:'#C0392B',width:1,dash:'dot'}};
      const tQ2={x:[ages[0],ages[ages.length-1]],y:[50,50],mode:'lines',line:{color:'#C0392B',width:1,dash:'dot'}};
      const tQ3={x:[ages[0],ages[ages.length-1]],y:[75,75],mode:'lines',line:{color:'#C0392B',width:1,dash:'dot'}};
      const layout=Object.assign({},PLOTLY_LAYOUT_BASE,{
        xaxis:Object.assign({},PLOTLY_LAYOUT_BASE.xaxis,{range:[8,62],title:{text:'Alder',font:{size:12}}}),
        yaxis:Object.assign({},PLOTLY_LAYOUT_BASE.yaxis,{range:[-2,105],title:{text:'Summeret frekvens (%)',font:{size:12}}})
      });
      const graph=makePlotSpec([t1,tQ1,tQ2,tQ3],layout);
      return{type:"input",
        text:`Nedenstående graf viser aldersfordelingen af dagpengemodtagere i Danmark (summeret frekvens i %). Aflæs kvartilsættet ud fra figuren. Hvad er medianen (Q2)?`,
        graph,
        answer:String(Q2),
        accept:[String(Q2),Q2+" år",String(Q2-5),String(Q2+5)],
        explanation:`Aflæs ved 25%, 50% og 75% på y-aksen. Q1 = ${Q1}, Q2 = ${Q2}, Q3 = ${Q3}. Kvartilsættet er [${Q1}; ${Q2}; ${Q3}].`
      };
    },
  ],

  F4:[
    // 1. Renters rente - kapitalfremskrivning
    ()=>{
      const K0=rnd(1,10)*100, r=rnd(1,8), n=rnd(2,10);
      const Kn=Math.round(K0*Math.pow(1+r/100,n)*100)/100;
      return{type:"input",
        text:`Der indsættes ${K0} kr. i en bank til en årlig rente på ${r}%. Vis, hvordan man udregner, hvor meget de ${K0} kr. er vokset til efter ${n} år, og bestem dette beløb. (2 dec)`,
        answer:fmt(Kn),
        accept:[fmt(Kn),String(Kn),String(Math.round(Kn))],
        explanation:`Kₙ = K₀ · (1 + r)ⁿ = ${K0} · ${fmt(1+r/100)}^${n} = ${fmt(Kn)} kr.`
      };
    },
    // 2. Annuitetslån - månedlig ydelse
    ()=>{
      const K0=rnd(4,20)*10000, rm=rndF(0.3,1.0,1), n=rnd(24,84);
      const r=rm/100, y=Math.round(K0*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1)*100)/100;
      return{type:"input",
        text:`En person ønsker at optage et annuitetslån på ${K0} kr. til køb af en bil. Den månedlige rente er på ${fmt(rm)}% og tilbagebetalingsperioden er på ${n} måneder. Bestem den månedlige ydelse y. (2 dec)`,
        answer:fmt(y),
        accept:[fmt(y),String(y)],
        explanation:`y = K₀ · r · (1+r)ⁿ / ((1+r)ⁿ − 1) = ${K0} · ${fmt(r)} · ... ≈ ${fmt(y)} kr.`
      };
    },
    // 3. Annuitetsopsparing - fremtidsværdi
    ()=>{
      const yv=rnd(1,10)*100, rm=rndF(0.5,2.0,1), n=rnd(6,24);
      const r=rm/100, An=Math.round(yv*(Math.pow(1+r,n)-1)/r*100)/100;
      return{type:"input",
        text:`Der indsættes hver måned ${yv} kr. på en konto. Beløbet indsættes i alt ${n} gange og den månedlige rente er ${fmt(rm)}%. Hvor meget står der på kontoen efter den sidste indbetaling? (2 dec)`,
        answer:fmt(An),
        accept:[fmt(An),String(An)],
        explanation:`Aₙ = y · ((1+r)ⁿ − 1) / r = ${yv} · ((1+${fmt(r)})^${n} − 1) / ${fmt(r)} ≈ ${fmt(An)} kr.`
      };
    },
    // 4. Effektiv rente fra kvartalsrente/terminsrente
    ()=>{
      const rq=rndF(0.5,4.0,1), rEff=Math.round(((Math.pow(1+rq/100,4)-1)*100)*100)/100;
      return{type:"input",
        text:`Bestem den årlige effektive rente, når kvartalsrenten (terminsrenten) er på ${fmt(rq)}%. (2 dec)`,
        answer:fmt(rEff),
        accept:[fmt(rEff),String(rEff)],
        explanation:`reff = (1 + ${fmt(rq)}/100)⁴ − 1 = ${fmt(rEff)}%`
      };
    },
  ],
};

let selected="F0",sessionQs=[],qIndex=0,correct=0,wrong=0,maxCount=5,answered=false;

function startAllForloeb(){
  const perForloeb=maxCount<=5?1:maxCount<=10?1:2;
  sessionQs=[];
  Object.keys(FORLOEB).forEach(key=>{
    const gens=shuffle([...GENERATORS[key]]);
    let added=0,attempts=0;
    while(added<perForloeb&&attempts<perForloeb*6){
      attempts++;
      try{const q=gens[added%gens.length]();if(q){q._forloeb=key;sessionQs.push(q);added++;}}catch(e){}
    }
  });
  sessionQs=shuffle(sessionQs);
  qIndex=0;correct=0;wrong=0;
  show("screen-quiz");renderQuestion();
}

function init(){
  const grid=document.getElementById("forloeb-grid");
  Object.entries(FORLOEB).forEach(([key,name])=>{
    const btn=document.createElement("button");
    btn.className="f-btn"+(key===selected?" active":"");
    btn.innerHTML=`<span style="font-size:11px;color:#888">${key}</span><br>${name}`;
    btn.onclick=()=>selectForloeb(key,btn);
    grid.appendChild(btn);
  });
}
function selectForloeb(key,btn){selected=key;document.querySelectorAll(".f-btn").forEach(b=>b.classList.remove("active"));btn.classList.add("active");}
function setCount(n,btn){maxCount=n;document.querySelectorAll("#count-btns .f-btn").forEach(b=>b.classList.remove("active"));btn.classList.add("active");}
function show(id){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));document.getElementById(id).classList.add("active");}
function goHome(){show("screen-select");}
function generateQuestions(){
  const gens=shuffle([...GENERATORS[selected]]);
  const result=[];let attempts=0;
  while(result.length<maxCount&&attempts<maxCount*10){
    attempts++;
    try{const q=gens[result.length%gens.length]();if(q)result.push(q);}catch(e){}
  }
  return result;
}
function startQuiz(){
  sessionQs=generateQuestions();
  qIndex=0;correct=0;wrong=0;
  show("screen-quiz");renderQuestion();
}
function renderQuestion(){
  answered=false;
  const q=sessionQs[qIndex];
  document.getElementById("progress-fill").style.width=Math.round(qIndex/sessionQs.length*100)+"%";
  document.getElementById("q-counter").textContent=(qIndex+1)+" / "+sessionQs.length;
  document.getElementById("q-forloeb").textContent=FORLOEB[q._forloeb||selected];
  document.getElementById("q-type-label").textContent=q.type==="mc"?"Vælg det rigtige svar":"Skriv dit svar";
  document.getElementById("q-text").textContent=q.text;
  document.getElementById("feedback").className="feedback";
  document.getElementById("next-btn").style.display="none";
  const graphDiv=document.getElementById("q-graph");
  graphDiv.innerHTML="";
  if(q.graph){
    const plotId='plot_'+Date.now();
    const inner=document.createElement('div');
    inner.id=plotId;
    const wrap=document.createElement('div');
    wrap.className='plot-wrap';
    wrap.appendChild(inner);
    graphDiv.appendChild(wrap);
    const spec=q.graph;
    requestAnimationFrame(()=>{
      requestAnimationFrame(()=>{
        if(document.getElementById(plotId)){
          Plotly.newPlot(plotId,spec.traces,spec.layout,PLOTLY_CONFIG);
        }
      });
    });
  }
  const mcDiv=document.getElementById("mc-options");
  const inputDiv=document.getElementById("input-area");
  if(q.type==="mc"){
    inputDiv.style.display="none";mcDiv.innerHTML="";
    q.options.forEach((opt,i)=>{
      const btn=document.createElement("button");btn.className="mc-option";btn.textContent=opt;
      btn.onclick=()=>checkMC(i,btn,q);mcDiv.appendChild(btn);
    });
  } else {
    mcDiv.innerHTML="";inputDiv.style.display="block";
    const inp=document.getElementById("answer-input");inp.value="";inp.disabled=false;
    setTimeout(()=>inp.focus(),150);
  }
}
function checkMC(chosen,btn,q){
  if(answered)return;answered=true;
  document.querySelectorAll(".mc-option").forEach(b=>{b.onclick=null;b.classList.add("disabled");});
  if(chosen===q.correct){btn.classList.remove("disabled");btn.classList.add("correct");showFeedback(true,q.explanation);correct++;}
  else{btn.classList.remove("disabled");btn.classList.add("wrong");document.querySelectorAll(".mc-option")[q.correct].classList.remove("disabled");document.querySelectorAll(".mc-option")[q.correct].classList.add("show-correct");showFeedback(false,"Forkert. "+q.explanation);wrong++;}
  document.getElementById("next-btn").style.display="block";
}
function checkInput(){
  if(answered)return;
  const q=sessionQs[qIndex];
  const val=document.getElementById("answer-input").value.trim().replace(",",".");
  const accepts=q.accept.map(a=>a.replace(",",".").toLowerCase().trim());
  const ok=accepts.includes(val.toLowerCase());
  answered=true;document.getElementById("answer-input").disabled=true;
  if(ok){showFeedback(true,q.explanation);correct++;}
  else{showFeedback(false,"Forkert — svaret er: "+q.answer+". "+q.explanation);wrong++;}
  document.getElementById("next-btn").style.display="block";
}
function showFeedback(ok,msg){
  const fb=document.getElementById("feedback");
  fb.className="feedback "+(ok?"correct":"wrong");
  fb.textContent=(ok?"Rigtigt! ":"")+msg;
}
function nextQuestion(){qIndex++;if(qIndex>=sessionQs.length)showResult();else renderQuestion();}
function showResult(){
  const tot=correct+wrong;
  document.getElementById("res-correct").textContent=correct;
  document.getElementById("res-wrong").textContent=wrong;
  document.getElementById("res-pct").textContent=Math.round(correct/tot*100)+"%";
  show("screen-result");
}
init();
</script>
