<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mindstekrav — Matematiktræner</title>
<script src="https://www.geogebra.org/apps/deployggb.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;padding:1.5rem;background:#f5f5f0;min-height:100vh;max-width:680px;margin:0 auto}
.screen{display:none}.screen.active{display:block}
.card{background:#fff;border:1px solid #e0e0d8;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.forloeb-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-top:1rem}
.f-btn{background:#fff;border:1px solid #ccc;border-radius:8px;padding:0.75rem 1rem;cursor:pointer;font-size:13px;font-weight:500;color:#222;text-align:left;transition:background 0.15s;line-height:1.4}
.f-btn:hover{background:#f0f0ec}
.f-btn.active{border:2px solid #185FA5;background:#E6F1FB;color:#0C447C}
.q-label{font-size:12px;color:#666;margin-bottom:6px;font-weight:500;text-transform:uppercase;letter-spacing:0.5px}
.q-text{font-size:15px;color:#111;line-height:1.7;margin-bottom:1.25rem}
.mc-option{display:block;width:100%;text-align:left;background:#fff;border:1px solid #ccc;border-radius:8px;padding:0.6rem 1rem;margin-bottom:8px;cursor:pointer;font-size:14px;color:#222;transition:background 0.1s}
.mc-option:hover{background:#f0f0ec}
.mc-option.correct{background:#EAF3DE;border:2px solid #3B6D11;color:#27500A;pointer-events:none}
.mc-option.wrong{background:#FCEBEB;border:2px solid #A32D2D;color:#791F1F;pointer-events:none}
.mc-option.show-correct{background:#EAF3DE;border:2px solid #3B6D11;color:#27500A;pointer-events:none}
.mc-option.disabled{pointer-events:none;opacity:0.55}
.input-row{display:flex;gap:8px;align-items:center;margin-bottom:1rem}
.input-row input{flex:1;padding:0.5rem 0.75rem;border:1px solid #ccc;border-radius:8px;font-size:15px;background:#fff;color:#111}
.input-row input:disabled{background:#f5f5f0;color:#888}
.feedback{border-radius:8px;padding:0.75rem 1rem;font-size:14px;margin-bottom:1rem;display:none;line-height:1.6}
.feedback.correct{background:#EAF3DE;color:#27500A;display:block}
.feedback.wrong{background:#FCEBEB;color:#791F1F;display:block}
.score-row{display:flex;gap:12px;margin-bottom:1rem}
.score-box{background:#f5f5f0;border-radius:8px;padding:0.75rem 1rem;flex:1;text-align:center}
.score-box .num{font-size:24px;font-weight:500;color:#111}
.score-box .lbl{font-size:12px;color:#666}
button.primary{background:#fff;border:1px solid #ccc;border-radius:8px;padding:0.6rem 1.2rem;font-size:14px;cursor:pointer;color:#222;transition:background 0.15s}
button.primary:hover{background:#f0f0ec}
.progress-bar{height:4px;background:#e0e0d8;border-radius:2px;margin-bottom:1.25rem}
.progress-fill{height:4px;background:#185FA5;border-radius:2px;transition:width 0.3s}
.ggb-wrap{margin:1rem 0;border:1px solid #e0e0d8;border-radius:8px;overflow:hidden;background:#fff;min-height:300px}
h1{font-size:18px;font-weight:500;color:#111;margin-bottom:4px}
.sub{font-size:14px;color:#666;margin-bottom:1rem}
</style>
</head>
<body>

<div id="screen-select" class="screen active">
  <div class="card">
    <h1>Mindstekrav — matematiktræner</h1>
    <p class="sub">Vælg et forløb. Opgaverne genereres med tilfældige tal og interaktive GeoGebra-grafer.</p>
    <div class="forloeb-grid" id="forloeb-grid"></div>
  </div>
  <div class="card">
    <p style="font-size:13px;color:#666;margin-bottom:8px">Antal opgaver per session</p>
    <div style="display:flex;gap:8px;flex-wrap:wrap" id="count-btns">
      <button class="f-btn active" onclick="setCount(5,this)">5</button>
      <button class="f-btn" onclick="setCount(10,this)">10</button>
      <button class="f-btn" onclick="setCount(15,this)">15</button>
    </div>
  </div>
  <button class="primary" onclick="startQuiz()" style="width:100%;padding:0.75rem;font-size:15px">Start træning</button>
</div>

<div id="screen-quiz" class="screen">
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <span class="q-label" id="q-forloeb"></span>
      <span style="font-size:12px;color:#666" id="q-counter"></span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <p class="q-label" id="q-type-label"></p>
    <div id="q-extra"></div>
    <p class="q-text" id="q-text"></p>
    <div id="mc-options"></div>
    <div id="input-area" style="display:none">
      <div class="input-row">
        <input type="text" id="answer-input" placeholder="Skriv dit svar..." onkeydown="if(event.key==='Enter')checkInput()">
        <button class="primary" onclick="checkInput()">Tjek</button>
      </div>
    </div>
    <div class="feedback" id="feedback"></div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="primary" id="next-btn" onclick="nextQuestion()" style="display:none;flex:1">Næste opgave</button>
      <button class="primary" onclick="goHome()" style="font-size:13px;color:#888">Afslut</button>
    </div>
  </div>
</div>

<div id="screen-result" class="screen">
  <div class="card">
    <h1 style="margin-bottom:1rem">Resultat</h1>
    <div class="score-row">
      <div class="score-box"><div class="num" id="res-correct">0</div><div class="lbl">Rigtige</div></div>
      <div class="score-box"><div class="num" id="res-wrong">0</div><div class="lbl">Forkerte</div></div>
      <div class="score-box"><div class="num" id="res-pct">0%</div><div class="lbl">Score</div></div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="primary" onclick="startQuiz()" style="flex:1">Prøv igen</button>
      <button class="primary" onclick="goHome()" style="flex:1">Vælg forløb</button>
    </div>
  </div>
</div>

<script>
const FORLOEB={F1:"Lineære funktioner",F2:"Eksponentielle funktioner",F3:"Andengradsfunktioner",F4:"Differentialregning",F5:"Finansiel regning",F6:"Beskrivende statistik",F7:"Sandsynlighedsregning",F8:"Hypotesetest og konfidensintervaller"};

function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function rndF(a,b,d){return parseFloat((Math.random()*(b-a)+a).toFixed(d));}
function shuffle(a){let r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}
function fmt(n){return String(n).replace('.',',');}
function fak(n){return n<=1?1:n*fak(n-1);}

let ggbInstances=[];
let ggbCounter=0;

function makeGGBDiv(commands, xmin, xmax, ymin, ymax, width, height){
  const id='ggb_'+ggbCounter++;
  const wrapper=document.createElement('div');
  wrapper.className='ggb-wrap';
  wrapper.style.height=(height||300)+'px';
  const div=document.createElement('div');
  div.id=id;
  wrapper.appendChild(div);

  setTimeout(()=>{
    try{
      const params={
        appName:"graphing",
        width: width||600,
        height: height||300,
        showToolBar:false,
        showAlgebraInput:false,
        showMenuBar:false,
        showResetIcon:false,
        enableLabelDrags:false,
        enableShiftDragZoom:true,
        enableRightClick:false,
        errorDialogsActive:false,
        useBrowserForJS:false,
        allowStyleBar:false,
        preventFocus:true,
        scaleContainerClass:"ggb-wrap",
        autoHeight:false,
        appletOnLoad:function(api){
          ggbInstances.push(api);
          if(xmin!==undefined) api.setCoordSystem(xmin,xmax,ymin,ymax);
          commands.forEach(cmd=>api.evalCommand(cmd));
        }
      };
      const applet=new GGBApplet(params,true);
      applet.inject(id);
    }catch(e){
      div.innerHTML='<p style="padding:1rem;color:#888;font-size:13px">Graf kunne ikke indlæses — tjek internetforbindelse.</p>';
    }
  },100);

  return wrapper;
}

function destroyGGB(){
  ggbInstances=[];
  document.querySelectorAll('[id^="ggb_"]').forEach(el=>{
    try{el.innerHTML='';}catch(e){}
  });
}

const GENERATORS={
  F1:[
    ()=>{const a=rnd(-5,5)||1,b=rnd(-10,10);return{type:"input",text:`En lineær funktion har forskriften f(x) = ${a}x ${b>=0?'+ '+b:'− '+Math.abs(b)}. Hvad er hældningskoefficienten?`,answer:String(a),accept:[String(a)],explanation:`Hældningskoefficienten er a = ${a}.`};},
    ()=>{const a=rnd(-5,5)||1,b=rnd(-10,10);return{type:"input",text:`Hvad er skæringen med y-aksen for f(x) = ${a}x ${b>=0?'+ '+b:'− '+Math.abs(b)}?`,answer:String(b),accept:[String(b)],explanation:`b-værdien er ${b}. Det er f(0).`};},
    ()=>{
      const a=rnd(-4,4)||1,b=rnd(-8,8);
      const x1=rnd(0,3),y1=a*x1+b,x2=x1+rnd(1,4),y2=a*x2+b;
      const cmds=[
        `f(x)=${a}x+${b}`,
        `A=(${x1},${y1})`,`B=(${x2},${y2})`,
        `SetColor(A,"red")`,`SetColor(B,"red")`,
        `SetPointSize(A,5)`,`SetPointSize(B,5)`
      ];
      const el=makeGGBDiv(cmds,x1-3,x2+3,Math.min(y1,y2)-3,Math.max(y1,y2)+3);
      return{type:"input",text:`Grafen viser en lineær funktion gennem (${x1}, ${y1}) og (${x2}, ${y2}). Hvad er hældningskoefficienten?`,graph:el,answer:String(a),accept:[String(a)],explanation:`a = (${y2}−${y1})/(${x2}−${x1}) = ${y2-y1}/${x2-x1} = ${a}`};
    },
    ()=>{const a=rnd(-5,5)||1,b=rnd(-10,10),x=rnd(-5,5),fx=a*x+b;return{type:"input",text:`Bestem f(${x}), når f(x) = ${a}x ${b>=0?'+ '+b:'− '+Math.abs(b)}.`,answer:String(fx),accept:[String(fx)],explanation:`f(${x}) = ${a}·${x} ${b>=0?'+ '+b:'− '+Math.abs(b)} = ${fx}`};},
    ()=>{const s=rnd(20,60),p=rnd(8,20),k=rnd(3,15),t=s+p*k;return{type:"input",text:`En taxa koster ${s} kr i startgebyr og ${p} kr/km. Hvad koster en tur på ${k} km?`,answer:String(t),accept:[String(t),t+" kr"],explanation:`${s} + ${p}·${k} = ${t} kr`};},
    ()=>{const a=rnd(1,5),b=rnd(-10,10);return{type:"mc",text:`Hvad er den omvendte funktion til f(x) = ${a}x ${b>=0?'+ '+b:'− '+Math.abs(b)}?`,options:[`f⁻¹(x) = (x${b>=0?' − '+b:' + '+Math.abs(b)}) / ${a}`,`f⁻¹(x) = ${a}x ${b>=0?'− '+b:'+ '+Math.abs(b)}`,`f⁻¹(x) = x / ${a}`,`f⁻¹(x) = (x${b>=0?' + '+b:' − '+Math.abs(b)}) / ${a}`],correct:0,explanation:`Byt om: x = ${a}·y ${b>=0?'+ '+b:'− '+Math.abs(b)} → y = (x${b>=0?' − '+b:' + '+Math.abs(b)}) / ${a}`};},
    ()=>{const a=rnd(-4,4)||1,b=rnd(-5,5);return{type:"mc",text:`Er f(x) = ${a}x ${b>=0?'+ '+b:'− '+Math.abs(b)} voksende eller aftagende?`,options:["Voksende","Aftagende"],correct:a>0?0:1,explanation:`a = ${a} er ${a>0?"positiv → voksende":"negativ → aftagende"}.`};},
  ],
  F2:[
    ()=>{const b=rnd(2,50),a=rndF(0.85,1.5,2);return{type:"input",text:`f(x) = ${b} · ${fmt(a)}ˣ. Hvad er begyndelsesværdien?`,answer:String(b),accept:[String(b)],explanation:`f(0) = ${b} · 1 = ${b}`};},
    ()=>{const r=rnd(2,20),b=rnd(2,30),a=parseFloat((1+r/100).toFixed(2));return{type:"input",text:`Hvad er vækstraten i % for f(x) = ${b} · ${fmt(a)}ˣ?`,answer:String(r),accept:[String(r),r+"%"],explanation:`a = ${fmt(a)} = 1 + r/100 → r = ${r}%`};},
    ()=>{
      const rising=Math.random()>0.5,a=rising?rndF(1.2,1.8,2):rndF(0.5,0.85,2),b=rnd(1,4);
      const T=rising?Math.round(Math.log(2)/Math.log(a)*10)/10:Math.round(Math.log(0.5)/Math.log(a)*10)/10;
      const xMax=Math.ceil(T*3.5);
      const word=rising?"fordoblingskonstanten T₂":"halveringskonstanten T½";
      const yMax=rising?b*Math.pow(a,xMax)*1.1:b*1.3;
      const cmds=[
        `f(x)=${b}*${a}^x`,
        `SetColor(f,"#185FA5")`,
        `SetLineThickness(f,3)`
      ];
      const el=makeGGBDiv(cmds,0,xMax,0,yMax,600,280);
      return{type:"input",text:`Aflæs ${word} fra GeoGebra-grafen nedenfor. (1 decimal)`,graph:el,answer:fmt(T),accept:[fmt(T),String(T)],explanation:`${word} er den x-værdi hvor funktionen er ${rising?"fordoblet":"halveret"}. T = ${fmt(T)}.`};
    },
    ()=>{
      const a1=rndF(1.3,1.8,2),b1=rnd(2,5);
      const a2=rndF(0.5,0.8,2),b2=rnd(2,5);
      const which=rnd(0,1);
      const [ua,ub]=[which===0?a1:a2,which===0?b1:b2];
      const cmds=[
        `f(x)=${ub}*${ua}^x`,
        `SetColor(f,"#185FA5")`,
        `SetLineThickness(f,3)`
      ];
      const el=makeGGBDiv(cmds,-3,6,0,which===0?ub*Math.pow(ua,6)*1.1:ub*1.3,600,280);
      const opts=[`f(x) = ${b1} · ${fmt(a1)}ˣ`,`g(x) = ${b2} · ${fmt(a2)}ˣ`];
      return{type:"mc",text:`Hvilken forskrift passer til grafen?`,graph:el,options:opts,correct:which,explanation:`Begyndelsesværdien er ${ub} og funktionen er ${ua>1?"voksende":"aftagende"} med a = ${fmt(ua)}.`};
    },
    ()=>{const base=rnd(2,4),exp=rnd(2,4),bv=rnd(1,3),rhs=bv*Math.pow(base,exp);return{type:"input",text:`Løs ligningen ${bv} · ${base}ˣ = ${rhs}.`,answer:String(exp),accept:[String(exp),"x="+exp],explanation:`${base}ˣ = ${rhs/bv} = ${base}^${exp} → x = ${exp}`};},
    ()=>{const rising=Math.random()>0.5,a=rising?rndF(1.1,1.8,2):rndF(0.5,0.9,2),b=rnd(2,30);return{type:"mc",text:`Er f(x) = ${b} · ${fmt(a)}ˣ voksende eller aftagende?`,options:["Voksende","Aftagende"],correct:rising?0:1,explanation:`a = ${fmt(a)} ${a>1?"stoerre end 1 → voksende":"mindre end 1 → aftagende"}.`};},
  ],
  F3:[
    ()=>{const a=rnd(1,3),b=rnd(-6,6),c=rnd(-5,5),d=b*b-4*a*c;return{type:"input",text:`Beregn diskriminanten for f(x) = ${a}x² ${b>=0?'+ '+b:'− '+Math.abs(b)}x ${c>=0?'+ '+c:'− '+Math.abs(c)}.`,answer:String(d),accept:[String(d)],explanation:`d = b²−4ac = ${b*b}−${4*a*c} = ${d}`};},
    ()=>{
      const a=rnd(1,2)*(Math.random()>0.5?1:-1),xT=rnd(-4,4),b=-2*a*xT,c=rnd(-5,5);
      const yT=a*xT*xT+b*xT+c;
      const xMin=xT-5,xMax=xT+5;
      const ys=[xMin,xMax].map(x=>a*x*x+b*x+c);
      const yMin=Math.min(yT,Math.min(...ys))-2,yMax=Math.max(yT,Math.max(...ys))+2;
      const cmds=[
        `f(x)=${a}x^2+${b}x+${c}`,
        `SetColor(f,"#185FA5")`,
        `SetLineThickness(f,3)`
      ];
      const el=makeGGBDiv(cmds,xMin,xMax,yMin,yMax,600,300);
      return{type:"input",text:`Aflæs x-koordinaten til toppunktet fra grafen.`,graph:el,answer:String(xT),accept:[String(xT),"x="+xT],explanation:`Toppunktet er i x = −b/(2a) = ${xT}.`};
    },
    ()=>{
      const a=rnd(1,2)*(Math.random()>0.5?1:-1),b=rnd(-4,4),c=rnd(-6,6);
      const cmds=[
        `f(x)=${a}x^2+${b}x+${c}`,
        `SetColor(f,"#185FA5")`,
        `SetLineThickness(f,3)`
      ];
      const el=makeGGBDiv(cmds,-6,6,-10,15,600,280);
      return{type:"mc",text:`Grafen viser et andengradspolynomium. Hvad er fortegnet for a?`,graph:el,options:["a > 0 (åbner opad)","a < 0 (åbner nedad)"],correct:a>0?0:1,explanation:`Parablen åbner ${a>0?"opad → a > 0":"nedad → a < 0"}.`};
    },
    ()=>{const r1=rnd(-4,4),r2=rnd(-4,4),b=-(r1+r2),c=r1*r2,mn=Math.min(r1,r2);return{type:"input",text:`Bestem det mindste nulpunkt for f(x) = x² ${b>=0?'+ '+b:'− '+Math.abs(b)}x ${c>=0?'+ '+c:'− '+Math.abs(c)}.`,answer:String(mn),accept:[String(mn),"x="+mn],explanation:`Nulpunkterne er ${r1} og ${r2}. Det mindste er ${mn}.`};},
    ()=>{const scenarios=[{d:rnd(1,20),ans:0},{d:0,ans:1},{d:-rnd(1,10),ans:2}];const s=scenarios[rnd(0,2)];return{type:"mc",text:`Diskriminanten er d = ${s.d}. Hvad kan siges om nulpunkterne?`,options:["To nulpunkter","Præcis ét nulpunkt","Ingen nulpunkter"],correct:s.ans,explanation:["d > 0 → to","d = 0 → ét","d < 0 → ingen"][s.ans]+" nulpunkt(er)."};},
  ],
  F4:[
    ()=>{const a=rnd(-4,4)||1,b=rnd(-5,5),dA=2*a;return{type:"input",text:`Hvad er koefficienten foran x i f'(x), når f(x) = ${a}x² ${b>=0?'+ '+b:'− '+Math.abs(b)}x?`,answer:String(dA),accept:[String(dA)],explanation:`f'(x) = ${dA}x ${b>=0?'+ '+b:'− '+Math.abs(b)}.`};},
    ()=>{const a=rnd(-3,3)||1,b=rnd(-5,5),x0=rnd(-4,4),fpx=2*a*x0+b;return{type:"input",text:`Bestem f'(${x0}) for f(x) = ${a}x² ${b>=0?'+ '+b:'− '+Math.abs(b)}x.`,answer:String(fpx),accept:[String(fpx)],explanation:`f'(x) = ${2*a}x ${b>=0?'+ '+b:'− '+Math.abs(b)} → f'(${x0}) = ${fpx}`};},
    ()=>{
      const a=rndF(0.3,1.0,1)*(Math.random()>0.5?1:-1),b=rndF(-2,2,1),c=rndF(-3,3,1);
      const cmds=[
        `f(x)=${a}x^3+${b}x^2+${c}x`,
        `g(x)=${3*a}x^2+${2*b}x+${c}`,
        `SetColor(f,"#185FA5")`,
        `SetColor(g,"#C0392B")`,
        `SetLineThickness(f,3)`,
        `SetLineThickness(g,3)`,
        `text1=Text("f(x)",(-7,f(-7)+0.5))`,
        `text2=Text("f'(x)",(-7,g(-7)+0.5))`
      ];
      const el=makeGGBDiv(cmds,-8,8,-15,15,600,300);
      return{type:"mc",text:`Den blå kurve er f(x) og den røde er f'(x). Hvad gælder?`,graph:el,options:["Hvor f'(x) = 0, har f(x) et ekstremum","f'(x) og f(x) er ens","f'(x) er altid positiv","f(x) har ingen nulpunkter"],correct:0,explanation:`Nulpunkterne for f'(x) svarer til ekstremumspunkterne for f(x).`};
    },
    ()=>{const a=rnd(1,3)*(Math.random()>0.5?1:-1),xE=rnd(-4,4),b=-2*a*xE,c=rnd(-5,5);return{type:"mc",text:`f(x) = ${a}x² ${b>=0?'+ '+b:'− '+Math.abs(b)}x ${c>=0?'+ '+c:'− '+Math.abs(c)}. Hvad slags ekstremum er der i x = ${xE}?`,options:["Minimum","Maksimum"],correct:a>0?0:1,explanation:`a = ${a} er ${a>0?"positiv → minimum":"negativ → maksimum"}.`};},
    ()=>{const a=rnd(-5,5)||1,b=rnd(-8,8);return{type:"input",text:`Hvad er f'(x) for f(x) = ${a}x ${b>=0?'+ '+b:'− '+Math.abs(b)}? (skriv bare tallet)`,answer:String(a),accept:[String(a)],explanation:`Den afledede af ax+b er a = ${a}.`};},
    ()=>{
      const a=rnd(1,3)*(Math.random()>0.5?1:-1),b=rnd(-4,4),c=rnd(-5,5);
      const cmds=[
        `f(x)=${a}x^2+${b}x+${c}`,
        `g(x)=${2*a}x+${b}`,
        `SetColor(f,"#185FA5")`,
        `SetColor(g,"#C0392B")`,
        `SetLineThickness(f,3)`,
        `SetLineThickness(g,3)`
      ];
      const el=makeGGBDiv(cmds,-6,6,-12,15,600,300);
      return{type:"mc",text:`Den blå kurve er f(x) = ${a}x²+${b}x+${c} og den røde er f'(x). Hvad er monotoniforholdet for f?`,graph:el,options:[`f er voksende for x > ${-b/(2*a)}`,`f er voksende for x < ${-b/(2*a)}`,a>0?`f er voksende for x > ${-b/(2*a)} og aftagende for x < ${-b/(2*a)}`:`f er aftagende for x > ${-b/(2*a)} og voksende for x < ${-b/(2*a)}`,"f er konstant"],correct:2,explanation:`Toppunktet er i x = ${fmt(-b/(2*a))}. a ${a>0?"> 0 → minimum, voksende til højre":"< 0 → maksimum, aftagende til højre"}.`};
    },
  ],
  F5:[
    ()=>{const K0=rnd(1,10)*1000,r=rnd(1,8),n=rnd(2,10),Kn=Math.round(K0*Math.pow(1+r/100,n));return{type:"input",text:`${K0} kr indsættes til ${r}% p.a. Hvad er beløbet efter ${n} år? (hele kr)`,answer:String(Kn),accept:[String(Kn),Kn+" kr"],explanation:`Kn = ${K0} · ${fmt(1+r/100)}^${n} = ${Kn} kr`};},
    ()=>{const rm=rndF(0.3,1.5,1),rEff=Math.round(((Math.pow(1+rm/100,12)-1)*100)*100)/100;return{type:"input",text:`Månedlig rente ${fmt(rm)}%. Effektiv årlig rente? (2 decimaler)`,answer:fmt(rEff),accept:[fmt(rEff),String(rEff)],explanation:`(1+${fmt(rm)}/100)^12 − 1 = ${fmt(rEff)}%`};},
    ()=>{const K0=rnd(5,30)*10000,rm=rndF(0.3,1.0,1),n=rnd(24,84),r=rm/100,y=Math.round(K0*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1)*100)/100;return{type:"input",text:`Annuitetslån ${K0} kr, ${n} måneder, ${fmt(rm)}%/md. Månedlig ydelse? (2 dec)`,answer:fmt(y),accept:[fmt(y),String(y)],explanation:`y = K₀·r·(1+r)ⁿ/((1+r)ⁿ−1) ≈ ${fmt(y)} kr`};},
    ()=>{const yv=rnd(2,10)*100,rm=rndF(0.5,1.5,1),n=rnd(6,24),r=rm/100,An=Math.round(yv*(Math.pow(1+r,n)-1)/r*100)/100;return{type:"input",text:`${yv} kr/md i ${n} måneder, ${fmt(rm)}%/md rente. Fremtidsværdi? (2 dec)`,answer:fmt(An),accept:[fmt(An),String(An)],explanation:`An = ${yv}·((1+${fmt(r)})^${n}−1)/${fmt(r)} ≈ ${fmt(An)} kr`};},
    ()=>{const rq=rndF(0.5,3.0,1),rEff=Math.round(((Math.pow(1+rq/100,4)-1)*100)*100)/100;return{type:"input",text:`Kvartalsrente ${fmt(rq)}%. Effektiv årlig rente? (2 dec)`,answer:fmt(rEff),accept:[fmt(rEff),String(rEff)],explanation:`(1+${fmt(rq)}/100)^4 − 1 = ${fmt(rEff)}%`};},
  ],
  F6:[
    ()=>{const n=rnd(4,7),vals=Array.from({length:n},()=>rnd(1,20)),mean=Math.round(vals.reduce((a,b)=>a+b,0)/n*10)/10;return{type:"input",text:`Beregn gennemsnittet af: ${vals.join(', ')}. (1 decimal)`,answer:fmt(mean),accept:[fmt(mean),String(mean)],explanation:`(${vals.join('+')}) / ${n} = ${fmt(mean)}`};},
    ()=>{const n=rnd(3,7)*2-1,vals=Array.from({length:n},()=>rnd(1,20)).sort((a,b)=>a-b),med=vals[Math.floor(n/2)];return{type:"input",text:`Find medianen: ${vals.join(', ')}.`,answer:String(med),accept:[String(med)],explanation:`Sorteret. Midterste = ${med}.`};},
    ()=>{const n=rnd(5,8),vals=Array.from({length:n},()=>rnd(1,30)),vb=Math.max(...vals)-Math.min(...vals);return{type:"input",text:`Variationsbredde for: ${vals.join(', ')}?`,answer:String(vb),accept:[String(vb)],explanation:`max − min = ${Math.max(...vals)} − ${Math.min(...vals)} = ${vb}`};},
    ()=>{
      const vals=[1,2,3,4,5,6];
      const hyps=Array.from({length:6},()=>rnd(2,15));
      const typIdx=hyps.indexOf(Math.max(...hyps));
      const cmds=vals.map((v,i)=>`Segment((${v},0),(${v},${hyps[i]}))`);
      const dotCmds=vals.map((v,i)=>`Point({${v},${hyps[i]}})`);
      const allCmds=[...cmds,...dotCmds,`SetColor(Segment1,"#185FA5")`];
      const el=makeGGBDiv([
        ...vals.map((v,i)=>`s${i}=Segment((${v},0),(${v},${hyps[i]}))`),
        ...vals.map((v,i)=>`p${i}=(${v},${hyps[i]})`),
        `SetAxesRatio(1,1)`
      ],0,7,0,Math.max(...hyps)+2,600,250);
      return{type:"input",text:`Aflæs typetallet fra pindediagrammet.`,graph:el,answer:String(vals[typIdx]),accept:[String(vals[typIdx])],explanation:`Den højeste pind er ved ${vals[typIdx]} — det er typetallet.`};
    },
    ()=>{const total=rnd(20,50),hyp=rnd(3,total-3),freq=Math.round(hyp/total*100)/100;return{type:"input",text:`${hyp} ud af ${total} observationer. Relativ frekvens? (2 dec)`,answer:fmt(freq),accept:[fmt(freq),String(freq)],explanation:`${hyp} / ${total} = ${fmt(freq)}`};},
  ],
  F7:[
    ()=>{const total=rnd(4,10),fav=rnd(1,total-1),p=Math.round(fav/total*100)/100;return{type:"input",text:`Pose med ${total} kugler, ${fav} røde. P(rød)? (2 dec)`,answer:fmt(p),accept:[fmt(p),String(p),fav+"/"+total],explanation:`P(rød) = ${fav}/${total} = ${fmt(p)}`};},
    ()=>{const n=rnd(5,20),p=rnd(1,9)/10,mu=Math.round(n*p*10)/10;return{type:"input",text:`X ~ b(n=${n}, p=${fmt(p)}). Middelværdi μ?`,answer:fmt(mu),accept:[fmt(mu),String(mu)],explanation:`μ = n·p = ${n}·${fmt(p)} = ${fmt(mu)}`};},
    ()=>{
      const n=rnd(8,15),p=rnd(1,4)/10;
      function C(n,k){return fak(n)/(fak(k)*fak(n-k));}
      const probs=Array.from({length:n+1},(_,k)=>Math.round(C(n,k)*Math.pow(p,k)*Math.pow(1-p,n-k)*1000)/1000);
      const k=rnd(0,3);
      const pk=probs[k];
      const barCmds=probs.map((pv,i)=>`bar${i}=Polygon((${i}-0.35,0),(${i}+0.35,0),(${i}+0.35,${pv}),(${i}-0.35,${pv}))`);
      const el=makeGGBDiv([...barCmds],−0.5,n+0.5,0,Math.max(...probs)*1.2,600,260);
      return{type:"input",text:`Binomialfordeling n=${n}, p=${fmt(p)}. Hvad er ca. P(X=${k})? (2 dec)`,graph:el,answer:fmt(pk),accept:[fmt(pk),String(pk),fmt(Math.round(pk*10)/10)],explanation:`P(X=${k}) ≈ ${fmt(pk)}`};
    },
    ()=>{const r=rnd(1,5),b=rnd(1,5),tot=r+b,pR=Math.round(r/tot*100)/100;return{type:"mc",text:`Pose med ${r} røde og ${b} blå. P(rød)?`,options:[fmt(pR),fmt(Math.round(b/tot*100)/100),fmt(Math.round(r/b*100)/100),"1"],correct:0,explanation:`P(rød) = ${r}/${tot} = ${fmt(pR)}`};},
    ()=>{const n=rnd(5,10),k=rnd(2,Math.min(4,n-1)),C=fak(n)/(fak(k)*fak(n-k));return{type:"input",text:`Vælg ${k} ud af ${n} (rækkefølge irrelevant). Antal muligheder?`,answer:String(C),accept:[String(C)],explanation:`K(${n},${k}) = ${C}`};},
    ()=>{const n=rnd(3,10),p=rnd(1,5)/10;return{type:"mc",text:`Hvad angiver X ~ b(n=${n}, p=${fmt(p)})?`,options:[`Binomialfordeling, ${n} forsøg, p=${fmt(p)}`,"Normalfordeling","Poissonfordeling"],correct:0,explanation:`b(n,p) = binomialfordeling med n=${n} og p=${fmt(p)}.`};},
  ],
  F8:[
    ()=>{const alpha=Math.random()>0.5?0.05:0.01,reject=Math.random()>0.5,p=reject?rndF(0.001,alpha-0.001,3):rndF(alpha+0.001,0.2,3);return{type:"mc",text:`χ²-test: p = ${fmt(p)}, α = ${fmt(alpha)}. Konklusion?`,options:["Forkast H₀","Accepter H₀"],correct:reject?0:1,explanation:`p ${reject?'<':'>'} α → ${reject?"forkast":"accepter"} H₀.`};},
    ()=>{const phat=rndF(0.2,0.8,2),se=rndF(0.02,0.07,3),upper=Math.round((phat+1.96*se)*1000)/1000;return{type:"input",text:`p̂ = ${fmt(phat)}, SE = ${fmt(se)}. Øvre grænse 95% KI? (3 dec)`,answer:fmt(upper),accept:[fmt(upper),String(upper)],explanation:`${fmt(phat)} + 1,96·${fmt(se)} = ${fmt(upper)}`};},
    ()=>{const phat=rndF(0.2,0.8,2),se=rndF(0.02,0.07,3),lower=Math.round((phat-1.96*se)*1000)/1000;return{type:"input",text:`p̂ = ${fmt(phat)}, SE = ${fmt(se)}. Nedre grænse 95% KI? (3 dec)`,answer:fmt(lower),accept:[fmt(lower),String(lower)],explanation:`${fmt(phat)} − 1,96·${fmt(se)} = ${fmt(lower)}`};},
    ()=>{const r=rnd(2,4),c=rnd(2,5),df=(r-1)*(c-1);return{type:"input",text:`Frihedsgrader for ${r}×${c} krydstabel?`,answer:String(df),accept:[String(df)],explanation:`(${r}−1)·(${c}−1) = ${df}`};},
    ()=>{const r1=rnd(50,150),r2=rnd(50,150),tot=r1+r2,c1=rnd(30,Math.floor(tot*0.7)),e11=Math.round(r1*c1/tot*100)/100;return{type:"input",text:`Rækketotal=${r1}, kolonnetotal=${c1}, n=${tot}. Forventet E₁₁? (2 dec)`,answer:fmt(e11),accept:[fmt(e11),String(e11)],explanation:`E₁₁ = ${r1}·${c1}/${tot} = ${fmt(e11)}`};},
    ()=>{return{type:"mc",text:`H₀ i en χ²-uafhængighedstest?`,options:["Ingen sammenhæng","Der er sammenhæng","Middelværdierne er ens"],correct:0,explanation:`H₀: ingen sammenhæng. H₁: sammenhæng.`};},
  ],
};

let selected="F1",sessionQs=[],qIndex=0,correct=0,wrong=0,maxCount=5,answered=false;

function init(){
  const grid=document.getElementById("forloeb-grid");
  Object.entries(FORLOEB).forEach(([key,name])=>{
    const btn=document.createElement("button");
    btn.className="f-btn"+(key===selected?" active":"");
    btn.innerHTML=`<span style="font-size:11px;color:#666">${key}</span><br>${name}`;
    btn.onclick=()=>selectForloeb(key,btn);
    grid.appendChild(btn);
  });
}
function selectForloeb(key,btn){selected=key;document.querySelectorAll(".f-btn").forEach(b=>b.classList.remove("active"));btn.classList.add("active");}
function setCount(n,btn){maxCount=n;document.querySelectorAll("#count-btns .f-btn").forEach(b=>b.classList.remove("active"));btn.classList.add("active");}
function show(id){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));document.getElementById(id).classList.add("active");}
function goHome(){destroyGGB();show("screen-select");}

function generateQuestions(){
  const gens=shuffle([...GENERATORS[selected]]);
  const result=[];
  let attempts=0;
  while(result.length<maxCount&&attempts<maxCount*6){
    attempts++;
    try{const q=gens[result.length%gens.length]();if(q)result.push(q);}catch(e){}
  }
  return result;
}

function startQuiz(){
  destroyGGB();
  sessionQs=generateQuestions();
  qIndex=0;correct=0;wrong=0;
  show("screen-quiz");renderQuestion();
}

function renderQuestion(){
  answered=false;
  const q=sessionQs[qIndex];
  document.getElementById("progress-fill").style.width=Math.round(qIndex/sessionQs.length*100)+"%";
  document.getElementById("q-counter").textContent=(qIndex+1)+" / "+sessionQs.length;
  document.getElementById("q-forloeb").textContent=FORLOEB[selected];
  document.getElementById("q-type-label").textContent=q.type==="mc"?"Vælg det rigtige svar":"Skriv dit svar";
  document.getElementById("q-text").textContent=q.text;
  document.getElementById("feedback").className="feedback";
  document.getElementById("next-btn").style.display="none";

  const extra=document.getElementById("q-extra");
  extra.innerHTML="";
  if(q.graph) extra.appendChild(q.graph);

  const mcDiv=document.getElementById("mc-options");
  const inputDiv=document.getElementById("input-area");
  if(q.type==="mc"){
    inputDiv.style.display="none";mcDiv.innerHTML="";
    q.options.forEach((opt,i)=>{
      const btn=document.createElement("button");btn.className="mc-option";btn.textContent=opt;
      btn.onclick=()=>checkMC(i,btn,q);mcDiv.appendChild(btn);
    });
  } else {
    mcDiv.innerHTML="";inputDiv.style.display="block";
    const inp=document.getElementById("answer-input");inp.value="";inp.disabled=false;
    setTimeout(()=>inp.focus(),100);
  }
}

function checkMC(chosen,btn,q){
  if(answered)return;answered=true;
  document.querySelectorAll(".mc-option").forEach(b=>{b.onclick=null;b.classList.add("disabled");});
  if(chosen===q.correct){btn.classList.remove("disabled");btn.classList.add("correct");showFeedback(true,q.explanation);correct++;}
  else{btn.classList.remove("disabled");btn.classList.add("wrong");document.querySelectorAll(".mc-option")[q.correct].classList.remove("disabled");document.querySelectorAll(".mc-option")[q.correct].classList.add("show-correct");showFeedback(false,"Forkert. "+q.explanation);wrong++;}
  document.getElementById("next-btn").style.display="block";
}

function checkInput(){
  if(answered)return;
  const q=sessionQs[qIndex];
  const val=document.getElementById("answer-input").value.trim().replace(",",".");
  const accepts=q.accept.map(a=>a.replace(",",".").toLowerCase().trim());
  const ok=accepts.includes(val.toLowerCase());
  answered=true;document.getElementById("answer-input").disabled=true;
  if(ok){showFeedback(true,q.explanation);correct++;}
  else{showFeedback(false,"Forkert — svaret er: "+q.answer+". "+q.explanation);wrong++;}
  document.getElementById("next-btn").style.display="block";
}

function showFeedback(ok,msg){
  const fb=document.getElementById("feedback");fb.className="feedback "+(ok?"correct":"wrong");
  fb.textContent=(ok?"Rigtigt! ":"")+msg;
}

function nextQuestion(){qIndex++;if(qIndex>=sessionQs.length)showResult();else renderQuestion();}

function showResult(){
  const tot=correct+wrong;
  document.getElementById("res-correct").textContent=correct;
  document.getElementById("res-wrong").textContent=wrong;
  document.getElementById("res-pct").textContent=Math.round(correct/tot*100)+"%";
  show("screen-result");
}

init();
</script>
